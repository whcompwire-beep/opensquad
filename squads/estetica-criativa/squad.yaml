name: estetica-criativa
display_name: "Estética Criativa — Squad de Conteúdo"
description: >
  Squad completo de marketing digital para empresa de estética e beleza feminina.
  Produz conteúdo para Instagram Feed (carrossel e imagem única), Instagram Reels e
  Instagram Stories voltado para mulheres que buscam serviços de estética.
version: "1.0.0"
created: "2026-03-27"
performance_mode: alta_performance

investigation:
  enriched: true
  profiles_analyzed: 3
  date: "2026-03-27"
  dir: squads/estetica-criativa/_investigations

platforms:
  - instagram-feed
  - instagram-reels
  - instagram-stories

company: Estética Criativa

agents:
  - id: estrategista
    name: Estrategista de Beleza
    file: agents/estrategista.agent.md
    role: strategist
  - id: redatora
    name: Redatora Criativa
    file: agents/redatora.agent.md
    role: writer
  - id: revisora
    name: Revisora de Qualidade
    file: agents/revisora.agent.md
    role: reviewer
  - id: designer
    name: Designer Visual
    file: agents/designer.agent.md
    role: designer

pipeline:
  steps:
    - id: checkpoint-tema
      type: checkpoint
      label: "Definir tema e tom desta rodada"
      file: pipeline/steps/01-checkpoint-tema.step.md

    - id: estrategia
      agent: estrategista
      file: pipeline/steps/02-estrategia.step.md
      description: "Cria briefing com 3 ângulos de conteúdo e variantes de hook"

    - id: checkpoint-estrategia
      type: checkpoint
      label: "Aprovar estratégia de conteúdo"
      file: pipeline/steps/03-checkpoint-estrategia.step.md

    - id: conteudo
      agent: redatora
      file: pipeline/steps/04-conteudo.step.md
      description: "Cria conteúdo completo para Feed (carrossel + imagem), Reels e Stories"

    - id: checkpoint-conteudo
      type: checkpoint
      label: "Aprovar rascunhos de conteúdo"
      file: pipeline/steps/05-checkpoint-conteudo.step.md

    - id: revisao
      agent: revisora
      file: pipeline/steps/06-revisao.step.md
      description: "Avalia qualidade, score e solicita ajustes se necessário"

    - id: visual
      agent: designer
      file: pipeline/steps/07-visual.step.md
      description: "Renderiza HTML/CSS em PNGs prontos para publicar (carrossel, reels, feed, stories)"

    - id: checkpoint-visual
      type: checkpoint
      label: "Aprovar imagens geradas"
      file: pipeline/steps/08-checkpoint-visual.step.md

output_dir: squads/estetica-criativa/output
memory_file: squads/estetica-criativa/_memory/memories.md
