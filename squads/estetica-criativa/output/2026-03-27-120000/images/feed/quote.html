<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px; overflow: hidden;
      background-image:
        linear-gradient(rgba(253,250,247,0.82), rgba(253,250,247,0.82)),
        url('../FotoLais.png');
      background-size: cover;
      background-position: center top;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px;
      position: relative;
    }
    .corner-tl, .corner-br {
      position: absolute;
      width: 80px; height: 80px;
    }
    .corner-tl {
      top: 40px; left: 40px;
      border-top: 3px solid #C9A87C;
      border-left: 3px solid #C9A87C;
    }
    .corner-br {
      bottom: 40px; right: 40px;
      border-bottom: 3px solid #C9A87C;
      border-right: 3px solid #C9A87C;
    }
    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 180px; font-weight: 700;
      color: #C9A87C;
      opacity: 0.15;
      position: absolute;
      top: 60px; left: 60px;
      line-height: 1;
    }
    .accent-line {
      width: 60px; height: 3px;
      background: #C9A87C;
      margin-bottom: 50px;
    }
    blockquote {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 600;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.3;
      font-style: italic;
      margin-bottom: 55px;
    }
    .brand {
      font-family: 'Lato', sans-serif;
      font-size: 26px; font-weight: 500;
      color: #C9A87C;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="quote-mark">"</div>
  <div class="accent-line"></div>
  <blockquote>Sua pele carrega tudo<br>que você passou.<br>Merece também<br>cuidado profissional.</blockquote>
  <span class="brand">Estética Criativa</span>
</body>
</html>
