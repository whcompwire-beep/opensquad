<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background-image:
        linear-gradient(rgba(245,239,230,0.88), rgba(245,239,230,0.88)),
        url('../FotoLais.png');
      background-size: cover;
      background-position: center top;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #C9A87C, #E8D5B7);
    }
    .question-badge {
      font-size: 28px; font-weight: 500;
      color: #C9A87C;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 50px;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 70px; font-weight: 700;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 60px;
    }
    .divider {
      width: 80px; height: 2px;
      background: #C9A87C;
      margin-bottom: 60px;
    }
    .body-text {
      font-size: 40px; font-weight: 400;
      color: #5A5A5A;
      text-align: center;
      line-height: 1.65;
    }
    .highlight {
      font-family: 'Playfair Display', serif;
      font-size: 44px; font-weight: 600;
      color: #C9A87C;
      text-align: center;
      margin-top: 40px;
      line-height: 1.4;
    }
    .brand {
      position: absolute; bottom: 55px; right: 70px;
      font-size: 24px; font-weight: 500; color: #C9A87C;
      letter-spacing: 3px; text-transform: uppercase;
      font-family: 'Lato', sans-serif;
    }
    .slide-num {
      position: absolute; bottom: 55px; left: 70px;
      font-size: 22px; color: #C9A87C;
      font-family: 'Lato', sans-serif;
    }
    .bottom-line {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 4px; background: #E8D5B7;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="question-badge">Frequência ideal</div>
  <h2>Com que frequência fazer?</h2>
  <div class="divider"></div>
  <p class="body-text">Não existe regra fixa.<br>Depende do seu tipo de pele,<br>da sua rotina e dos seus objetivos.</p>
  <p class="highlight">Uma avaliação profissional<br>define o ideal para você.</p>
  <span class="brand">Estética Criativa</span>
  <span class="slide-num">5 / 6</span>
  <div class="bottom-line"></div>
</body>
</html>
