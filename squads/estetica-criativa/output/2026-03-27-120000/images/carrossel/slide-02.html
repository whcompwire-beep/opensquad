<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background-image:
        linear-gradient(rgba(253,250,247,0.90), rgba(253,250,247,0.90)),
        url('../FotoLais.png');
      background-size: cover;
      background-position: center top;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #C9A87C, #E8D5B7);
    }
    .mito-badge {
      display: flex; align-items: center; gap: 18px;
      background: #FFF0F0;
      border: 2px solid #E8B4B4;
      border-radius: 16px;
      padding: 24px 40px;
      margin-bottom: 60px;
    }
    .mito-badge .x { font-size: 52px; }
    .mito-badge .mito-label {
      font-size: 30px; font-weight: 700;
      color: #C0505A;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .mito-text {
      font-family: 'Playfair Display', serif;
      font-size: 58px; font-weight: 600;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.3;
      font-style: italic;
    }
    .sub {
      margin-top: 50px;
      font-size: 38px; font-weight: 400;
      color: #8B8B8B;
      text-align: center;
      line-height: 1.5;
    }
    .brand {
      position: absolute; bottom: 55px; right: 70px;
      font-size: 24px; font-weight: 500; color: #C9A87C;
      letter-spacing: 3px; text-transform: uppercase;
      font-family: 'Lato', sans-serif;
    }
    .slide-num {
      position: absolute; bottom: 55px; left: 70px;
      font-size: 22px; color: #C9A87C;
      font-family: 'Lato', sans-serif;
    }
    .bottom-line {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 4px; background: #F0E8DC;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="mito-badge">
    <span class="x">❌</span>
    <span class="mito-label">O que muita gente acredita</span>
  </div>
  <p class="mito-text">"Eu tenho a pele boa,<br>não preciso de limpeza."</p>
  <p class="sub">Será mesmo?</p>
  <span class="brand">Estética Criativa</span>
  <span class="slide-num">2 / 6</span>
  <div class="bottom-line"></div>
</body>
</html>
