<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background-image:
        linear-gradient(rgba(253,250,247,0.92), rgba(253,250,247,0.92)),
        url('../FotoLais.png');
      background-size: cover;
      background-position: center top;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 100px 100px;
      position: relative;
    }
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #C9A87C, #E8D5B7);
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 60px; font-weight: 700;
      color: #2C2C2C;
      line-height: 1.2;
      margin-bottom: 70px;
    }
    .benefit {
      display: flex; align-items: flex-start; gap: 28px;
      margin-bottom: 46px;
    }
    .benefit .icon { font-size: 48px; flex-shrink: 0; margin-top: 4px; }
    .benefit .text {
      font-size: 44px; font-weight: 400;
      color: #3A3A3A;
      line-height: 1.3;
    }
    .accent-line {
      width: 70px; height: 3px;
      background: #C9A87C;
      margin-bottom: 60px;
    }
    .brand {
      position: absolute; bottom: 55px; right: 70px;
      font-size: 24px; font-weight: 500; color: #C9A87C;
      letter-spacing: 3px; text-transform: uppercase;
      font-family: 'Lato', sans-serif;
    }
    .slide-num {
      position: absolute; bottom: 55px; left: 70px;
      font-size: 22px; color: #C9A87C;
      font-family: 'Lato', sans-serif;
    }
    .bottom-line {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 4px; background: #F0E8DC;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="accent-line"></div>
  <h2>O que a limpeza profissional faz:</h2>
  <div class="benefit"><span class="icon">✨</span><span class="text">Melhora a textura</span></div>
  <div class="benefit"><span class="icon">💧</span><span class="text">Aumenta a absorção dos ativos</span></div>
  <div class="benefit"><span class="icon">🌿</span><span class="text">Equilibra a oleosidade</span></div>
  <div class="benefit"><span class="icon">⏳</span><span class="text">Previne o envelhecimento precoce</span></div>
  <div class="benefit"><span class="icon">🔆</span><span class="text">Deixa a pele mais luminosa</span></div>
  <span class="brand">Estética Criativa</span>
  <span class="slide-num">4 / 6</span>
  <div class="bottom-line"></div>
</body>
</html>
