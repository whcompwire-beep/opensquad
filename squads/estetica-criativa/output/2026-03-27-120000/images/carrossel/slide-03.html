<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background-image:
        linear-gradient(rgba(253,250,247,0.90), rgba(253,250,247,0.90)),
        url('../FotoLais.png');
      background-size: cover;
      background-position: center top;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #C9A87C, #E8D5B7);
    }
    .verdade-badge {
      display: flex; align-items: center; gap: 18px;
      background: #F0FAF0;
      border: 2px solid #A8D8A8;
      border-radius: 16px;
      padding: 24px 40px;
      margin-bottom: 60px;
    }
    .verdade-badge .check { font-size: 48px; }
    .verdade-badge .v-label {
      font-size: 30px; font-weight: 700;
      color: #4A8A4A;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 56px; font-weight: 700;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 55px;
    }
    .items {
      display: flex; flex-direction: column; gap: 24px;
      width: 100%;
    }
    .item {
      font-size: 42px; font-weight: 400;
      color: #4A4A4A;
      text-align: center;
      line-height: 1.3;
    }
    .item span { color: #C9A87C; font-weight: 600; }
    .brand {
      position: absolute; bottom: 55px; right: 70px;
      font-size: 24px; font-weight: 500; color: #C9A87C;
      letter-spacing: 3px; text-transform: uppercase;
      font-family: 'Lato', sans-serif;
    }
    .slide-num {
      position: absolute; bottom: 55px; left: 70px;
      font-size: 22px; color: #C9A87C;
      font-family: 'Lato', sans-serif;
    }
    .bottom-line {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 4px; background: #F0E8DC;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="verdade-badge">
    <span class="check">✅</span>
    <span class="v-label">A verdade sobre sua pele</span>
  </div>
  <h2>Toda pele acumula impurezas.</h2>
  <div class="items">
    <div class="item">Células mortas</div>
    <div class="item">Resíduos de produto</div>
    <div class="item">Poluição &amp; protetor solar</div>
    <div class="item" style="margin-top:16px; color:#C9A87C; font-weight:600; font-size:44px;">Nada disso sai só com água.</div>
  </div>
  <span class="brand">Estética Criativa</span>
  <span class="slide-num">3 / 6</span>
  <div class="bottom-line"></div>
</body>
</html>
