<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background-image:
        linear-gradient(rgba(253,250,247,0.68), rgba(240,232,220,0.72)),
        url('../FotoLais.png');
      background-size: cover;
      background-position: center top;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #C9A87C, #E8D5B7);
    }
    .accent-line {
      width: 80px; height: 3px;
      background: #C9A87C;
      margin-bottom: 60px;
    }
    .label {
      font-family: 'Lato', sans-serif;
      font-size: 26px; font-weight: 500;
      color: #C9A87C;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 50px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 82px; font-weight: 700;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.15;
    }
    .brand {
      position: absolute;
      bottom: 55px; right: 70px;
      font-family: 'Lato', sans-serif;
      font-size: 24px; font-weight: 500;
      color: #C9A87C;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .slide-num {
      position: absolute;
      bottom: 55px; left: 70px;
      font-size: 22px; font-weight: 400;
      color: #C9A87C;
      font-family: 'Lato', sans-serif;
    }
    .bottom-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: #F0E8DC;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="label">Cuidados com a pele</div>
  <div class="accent-line"></div>
  <h1>Limpeza de pele não é só para quem tem acne.</h1>
  <span class="brand">Estética Criativa</span>
  <span class="slide-num">1 / 6</span>
  <div class="bottom-line"></div>
</body>
</html>
