<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background-image:
        linear-gradient(rgba(245,239,230,0.78), rgba(245,239,230,0.78)),
        url('../FotoLais.png');
      background-size: cover;
      background-position: center top;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 120px 100px;
      position: relative;
    }
    .top-accent {
      position: absolute; top: 0; left: 0; right: 0;
      height: 10px;
      background: linear-gradient(90deg, #C9A87C, #E8D5B7, #C9A87C);
    }
    .bg-circle {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: rgba(201, 168, 124, 0.08);
      top: 200px;
    }
    .tag {
      font-size: 28px; font-weight: 500;
      color: #8B7355;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 60px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 86px; font-weight: 700;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 60px;
    }
    .accent-line {
      width: 80px; height: 3px;
      background: #C9A87C;
      margin-bottom: 60px;
    }
    .sub {
      font-family: 'Playfair Display', serif;
      font-size: 50px; font-weight: 400;
      color: #6B5B45;
      text-align: center;
      line-height: 1.45;
      font-style: italic;
    }
    .sub em {
      color: #C9A87C;
      font-style: italic;
      font-weight: 600;
    }
    .brand {
      position: absolute; bottom: 70px;
      left: 50%; transform: translateX(-50%);
      font-size: 26px; font-weight: 500; color: #C9A87C;
      letter-spacing: 4px; text-transform: uppercase;
      white-space: nowrap;
    }
    .bottom-accent {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #C9A87C, #E8D5B7, #C9A87C);
    }
  </style>
</head>
<body>
  <div class="top-accent"></div>
  <div class="bg-circle"></div>
  <div class="tag">Transformação real</div>
  <h1>Ela achava que a pele dela era assim mesmo.</h1>
  <div class="accent-line"></div>
  <p class="sub">Não era falta de cuidado.<br>Era falta de <em>estratégia.</em></p>
  <span class="brand">Estética Criativa</span>
  <div class="bottom-accent"></div>
</body>
</html>
