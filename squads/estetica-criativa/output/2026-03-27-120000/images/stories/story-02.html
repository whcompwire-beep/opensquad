<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background-image:
        linear-gradient(rgba(20,14,10,0.72), rgba(20,14,10,0.72)),
        url('../FotoLais.png');
      background-size: cover;
      background-position: center top;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 120px 90px;
      position: relative;
    }
    .top-accent {
      position: absolute; top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #C9A87C, #E8D5B7, #C9A87C);
    }
    .tag {
      font-size: 28px; font-weight: 500;
      color: #C9A87C;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 60px;
      border: 1px solid rgba(201,168,124,0.4);
      padding: 16px 40px;
      border-radius: 40px;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 76px; font-weight: 700;
      color: #FDFAF7;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 50px;
    }
    .accent-line {
      width: 70px; height: 3px;
      background: #C9A87C;
      margin-bottom: 70px;
    }
    /* Enquete simulada */
    .poll {
      width: 100%;
      display: flex; flex-direction: column; gap: 28px;
    }
    .poll-option {
      width: 100%;
      border-radius: 20px;
      padding: 34px 50px;
      font-size: 44px; font-weight: 600;
      text-align: center;
    }
    .poll-sim {
      background: #C9A87C;
      color: #2C2C2C;
    }
    .poll-nao {
      background: transparent;
      border: 2px solid #C9A87C;
      color: #C9A87C;
    }
    .brand {
      position: absolute; bottom: 70px;
      left: 50%; transform: translateX(-50%);
      font-size: 24px; font-weight: 500; color: #6B5B45;
      letter-spacing: 3px; text-transform: uppercase;
      white-space: nowrap;
    }
    .bottom-accent {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #C9A87C, #E8D5B7, #C9A87C);
    }
  </style>
</head>
<body>
  <div class="top-accent"></div>
  <div class="tag">Pergunta rápida</div>
  <h2>Você já fez limpeza de pele profissional?</h2>
  <div class="accent-line"></div>
  <div class="poll">
    <div class="poll-option poll-sim">✅ &nbsp; Sim, já fiz!</div>
    <div class="poll-option poll-nao">❌ &nbsp; Ainda não</div>
  </div>
  <span class="brand">Estética Criativa</span>
  <div class="bottom-accent"></div>
</body>
</html>
