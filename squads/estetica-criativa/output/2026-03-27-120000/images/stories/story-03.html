<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background-image:
        linear-gradient(rgba(139,107,61,0.72), rgba(100,72,30,0.80)),
        url('../FotoLais.png');
      background-size: cover;
      background-position: center top;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 120px 90px;
      position: relative;
    }
    .top-accent {
      position: absolute; top: 0; left: 0; right: 0;
      height: 8px;
      background: rgba(255,255,255,0.3);
    }
    .glow {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      top: 250px;
    }
    .accent-line {
      width: 80px; height: 3px;
      background: rgba(255,255,255,0.5);
      margin-bottom: 60px;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 86px; font-weight: 700;
      color: #FDFAF7;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 55px;
    }
    .divider {
      width: 60px; height: 2px;
      background: rgba(255,255,255,0.4);
      margin-bottom: 55px;
    }
    .sub {
      font-size: 46px; font-weight: 300;
      color: rgba(255,255,255,0.85);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 80px;
    }
    .cta-box {
      background: #FDFAF7;
      border-radius: 24px;
      padding: 36px 80px;
      font-size: 42px; font-weight: 700;
      color: #8B6B3D;
      letter-spacing: 1px;
    }
    .brand {
      position: absolute; bottom: 70px;
      left: 50%; transform: translateX(-50%);
      font-size: 26px; font-weight: 500;
      color: rgba(255,255,255,0.6);
      letter-spacing: 3px; text-transform: uppercase;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="top-accent"></div>
  <div class="glow"></div>
  <div class="accent-line"></div>
  <h2>Sua pele merece esse cuidado.</h2>
  <div class="divider"></div>
  <p class="sub">Agenda aberta esta semana.<br>Manda mensagem 💛</p>
  <div class="cta-box">Agendar avaliação</div>
  <span class="brand">Estética Criativa</span>
</body>
</html>
