<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px; overflow: hidden;
      background: linear-gradient(135deg, #F9D4D0 0%, #FFFFFF 50%, #E7D5BF 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 80px;
      position: relative;
    }
    .corner-tl {
      position: absolute; top: 50px; left: 50px;
      width: 60px; height: 60px;
      border-top: 3px solid #C38F8B;
      border-left: 3px solid #C38F8B;
    }
    .corner-br {
      position: absolute; bottom: 50px; right: 50px;
      width: 60px; height: 60px;
      border-bottom: 3px solid #C38F8B;
      border-right: 3px solid #C38F8B;
    }
    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 120px; font-style: italic;
      color: #F9D4D0;
      line-height: 0.5;
      align-self: flex-start;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 600;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 50px;
    }
    h1 em { font-style: italic; color: #A16C67; }
    .accent-line {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, #BDA78D, #C38F8B);
      margin-bottom: 40px;
    }
    .tagline {
      font-size: 30px; font-weight: 300;
      color: #AA9176;
      text-align: center;
      line-height: 1.5;
      letter-spacing: 1px;
    }
    .brand {
      position: absolute; bottom: 55px; right: 80px;
      font-size: 20px; font-weight: 700; color: #C38F8B;
      letter-spacing: 3px; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="quote-mark">"</div>
  <h1>Cuidar de si<br>não é luxo.<br>É decidir como você quer<br><em>gastar sua energia.</em></h1>
  <div class="accent-line"></div>
  <p class="tagline">Depilação definitiva — liberdade real.</p>
  <span class="brand">Estética Criativa</span>
</body>
</html>
