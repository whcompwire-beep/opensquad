<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(180deg, #1A1A1A 0%, #3D2B2B 35%, #AA9176 70%, #E7D5BF 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 0 90px;
      position: relative;
    }
    .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0) 60%); }
    .reel-tag {
      position: absolute; top: 80px; left: 90px;
      display: flex; align-items: center; gap: 12px;
    }
    .reel-tag .dot { width: 10px; height: 10px; border-radius: 50%; background: #E7D5BF; }
    .reel-tag span { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.8); letter-spacing: 5px; text-transform: uppercase; }
    .content { position: relative; z-index: 2; }
    .number-block {
      display: flex; align-items: baseline; gap: 20px;
      margin-bottom: 50px;
    }
    .big-number {
      font-family: 'Playfair Display', serif;
      font-size: 180px; font-weight: 700;
      color: rgba(255,255,255,0.12);
      line-height: 1;
    }
    .number-label { font-size: 32px; font-weight: 300; color: #E7D5BF; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 78px; font-weight: 700;
      color: #FFFFFF;
      line-height: 1.15;
      margin-bottom: 40px;
    }
    h1 em { font-style: italic; color: #E7D5BF; }
    .hook-line { width: 70px; height: 3px; background: #BDA78D; margin-bottom: 36px; }
    .sub { font-size: 36px; font-weight: 300; color: rgba(255,255,255,0.75); line-height: 1.6; }
    .brand { position: absolute; bottom: 60px; right: 90px; font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; z-index: 2; }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="reel-tag"><div class="dot"></div><span>Reel</span></div>
  <div class="content">
    <h1>Você não precisa se depilar toda semana<br><em>pelo resto da vida.</em></h1>
    <div class="hook-line"></div>
    <p class="sub">Mas ninguém te contou isso<br>de um jeito que fez sentido.</p>
  </div>
  <span class="brand">Estética Criativa</span>
</body>
</html>
