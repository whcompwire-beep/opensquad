<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(160deg, #A16C67 0%, #C38F8B 45%, #F9D4D0 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px 80px;
      position: relative;
    }
    .brand-top { position: absolute; top: 76px; left: 80px; font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 3px; text-transform: uppercase; }
    .story-number { position: absolute; top: 80px; right: 80px; font-size: 22px; color: rgba(255,255,255,0.5); font-weight: 300; letter-spacing: 3px; }
    .sun { font-size: 90px; margin-bottom: 60px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 76px; font-weight: 700;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 40px;
    }
    h1 em { font-style: italic; }
    .accent-line { width: 60px; height: 2px; background: rgba(255,255,255,0.5); margin-bottom: 40px; }
    .sub { font-size: 36px; font-weight: 300; color: rgba(255,255,255,0.85); text-align: center; line-height: 1.6; margin-bottom: 80px; }
    .cta-btn {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 70px;
      padding: 34px 80px;
      backdrop-filter: blur(4px);
      margin-bottom: 40px;
    }
    .cta-btn p { font-size: 38px; font-weight: 700; color: #FFFFFF; text-align: center; }
    .cta-sub { font-size: 26px; color: rgba(255,255,255,0.6); text-align: center; }
  </style>
</head>
<body>
  <span class="brand-top">Estética Criativa</span>
  <span class="story-number">3/3</span>
  <div class="sun">🌞</div>
  <h1>Você começa agora —<br>e chega no verão<br><em>do jeito que sempre quis.</em></h1>
  <div class="accent-line"></div>
  <p class="sub">Avaliação gratuita.<br>Sem compromisso. Só uma conversa.</p>
  <div class="cta-btn">
    <p>Manda mensagem 💛</p>
  </div>
  <p class="cta-sub">link na bio</p>
</body>
</html>
