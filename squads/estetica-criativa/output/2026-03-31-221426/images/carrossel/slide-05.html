<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1440px; overflow: hidden; background: #FFFFFF; font-family: 'Lato', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 100px 90px; position: relative; }
    .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, #BDA78D, #C38F8B, #AA9176); }
    .number-badge { position: absolute; top: 60px; right: 60px; font-size: 22px; color: #BDA78D; letter-spacing: 3px; font-weight: 300; }
    .myth-label { display: inline-flex; align-items: center; gap: 14px; margin-bottom: 50px; }
    .myth-label .icon { font-size: 52px; }
    .myth-label .tag { font-size: 24px; font-weight: 700; color: #C38F8B; letter-spacing: 4px; text-transform: uppercase; }
    .myth-text { font-family: 'Playfair Display', serif; font-size: 54px; font-weight: 400; font-style: italic; color: #A16C67; line-height: 1.3; margin-bottom: 60px; padding-left: 20px; border-left: 4px solid #F9D4D0; }
    .divider { width: 80px; height: 2px; background: linear-gradient(90deg, #D2BBA0, #C38F8B); margin-bottom: 50px; }
    .truth-label { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
    .truth-label .icon { font-size: 46px; }
    .truth-label .tag { font-size: 24px; font-weight: 700; color: #AA9176; letter-spacing: 4px; text-transform: uppercase; }
    .truth-text { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; color: #2C2C2C; line-height: 1.3; margin-bottom: 40px; }
    .truth-detail { font-size: 36px; font-weight: 300; color: #AA9176; line-height: 1.7; }
    .highlight-box { background: linear-gradient(135deg, #F9D4D0 0%, #E7D5BF 100%); border-radius: 16px; padding: 36px 44px; margin-top: 40px; }
    .highlight-box p { font-size: 34px; font-weight: 400; color: #A16C67; line-height: 1.5; }
    .brand { position: absolute; bottom: 50px; right: 60px; font-size: 22px; font-weight: 700; color: #D2BBA0; letter-spacing: 3px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <span class="number-badge">5 / 6</span>
  <div class="myth-label"><span class="icon">❌</span><span class="tag">Mito 4</span></div>
  <p class="myth-text">"Melhor fazer no verão."</p>
  <div class="divider"></div>
  <div class="truth-label"><span class="icon">✅</span><span class="tag">Verdade</span></div>
  <p class="truth-text">O inverno é o momento ideal.</p>
  <p class="truth-detail">Sem sol direto, a pele responde melhor.</p>
  <div class="highlight-box">
    <p>Você começa agora — e chega no verão <strong>do jeito que você sempre quis.</strong></p>
  </div>
  <span class="brand">Estética Criativa</span>
</body>
</html>
