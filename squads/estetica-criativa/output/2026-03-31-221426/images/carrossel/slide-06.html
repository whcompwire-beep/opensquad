<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: linear-gradient(160deg, #A16C67 0%, #C38F8B 50%, #F9D4D0 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px 80px;
      position: relative;
    }
    .number-badge { position: absolute; top: 60px; right: 60px; font-size: 22px; color: rgba(255,255,255,0.6); letter-spacing: 3px; font-weight: 300; }
    .heart { font-size: 64px; margin-bottom: 50px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 64px; font-weight: 700;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 30px;
    }
    .sub {
      font-size: 34px; font-weight: 300;
      color: rgba(255,255,255,0.85);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 70px;
    }
    .cta-box {
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 60px;
      padding: 30px 70px;
      backdrop-filter: blur(4px);
    }
    .cta-box p {
      font-size: 36px; font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 1px;
      text-align: center;
    }
    .brand { position: absolute; bottom: 50px; right: 60px; font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 3px; text-transform: uppercase; }
  </style>
</head>
<body>
  <span class="number-badge">6 / 6</span>
  <div class="heart">💛</div>
  <h1>Antes de desistir, entenda o processo.</h1>
  <p class="sub">Cada pele tem o seu protocolo ideal.<br>O primeiro passo é uma conversa.</p>
  <div class="cta-box">
    <p>Agende sua avaliação</p>
  </div>
  <span class="brand">Estética Criativa</span>
</body>
</html>
