<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: linear-gradient(160deg, #E7D5BF 0%, #FFFFFF 60%, #F9D4D0 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px 80px;
      position: relative;
    }
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #BDA78D, #C38F8B, #AA9176);
    }
    .number-badge {
      position: absolute;
      top: 60px; right: 60px;
      font-family: 'Lato', sans-serif;
      font-size: 22px;
      color: #AA9176;
      letter-spacing: 3px;
      font-weight: 300;
    }
    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #C38F8B;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 40px;
      text-align: center;
    }
    .accent-line {
      width: 80px; height: 2px;
      background: linear-gradient(90deg, #BDA78D, #C38F8B);
      margin-bottom: 50px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      font-weight: 700;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 50px;
    }
    h1 span {
      color: #A16C67;
      font-style: italic;
    }
    .subtitle {
      font-family: 'Lato', sans-serif;
      font-size: 32px;
      font-weight: 300;
      color: #AA9176;
      text-align: center;
      line-height: 1.6;
      letter-spacing: 1px;
    }
    .brand {
      position: absolute;
      bottom: 50px; right: 60px;
      font-family: 'Lato', sans-serif;
      font-size: 22px; font-weight: 700;
      color: #BDA78D;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .swipe-hint {
      position: absolute;
      bottom: 52px; left: 60px;
      font-size: 20px;
      color: #C38F8B;
      font-weight: 300;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <span class="number-badge">1 / 6</span>
  <div class="eyebrow">Depilação a Laser</div>
  <div class="accent-line"></div>
  <h1>5 mitos que ainda impedem mulheres de ter <span>resultado</span>.</h1>
  <p class="subtitle">Salva esse post — você vai querer reler.</p>
  <span class="swipe-hint">arrasta →</span>
  <span class="brand">Estética Criativa</span>
</body>
</html>
