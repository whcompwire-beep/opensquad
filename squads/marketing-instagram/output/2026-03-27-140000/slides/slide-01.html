<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #3D2B26;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 80px;
      position: relative;
    }
    .brand {
      position: absolute; top: 52px; right: 80px;
      font-family: 'Inter', sans-serif;
      font-size: 26px; font-weight: 400;
      color: #A89080; letter-spacing: 1px;
    }
    .tag {
      font-family: 'Inter', sans-serif;
      font-size: 26px; font-weight: 500;
      color: #C97D6E; letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 700;
      color: #FAF6F2; line-height: 1.2;
      max-width: 880px;
      margin-bottom: 36px;
    }
    h1 .accent { color: #C97D6E; }
    .divider {
      width: 80px; height: 3px;
      background: #C97D6E;
      margin-bottom: 36px;
    }
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 36px; font-weight: 400;
      color: #A89080; line-height: 1.5;
      max-width: 760px;
    }
    .swipe {
      position: absolute; bottom: 64px; right: 80px;
      font-family: 'Inter', sans-serif;
      font-size: 26px; font-weight: 400;
      color: #A89080;
      display: flex; align-items: center; gap: 10px;
    }
  </style>
</head>
<body>
  <span class="brand">@lais_esteticista</span>
  <div class="tag">Cuidados da Pele</div>
  <h1>Sua pele está <span class="accent">pedindo socorro</span> no inverno.</h1>
  <div class="divider"></div>
  <p class="subtitle">Você sabe reconhecer os sinais?</p>
  <span class="swipe">Arraste →</span>
</body>
</html>
