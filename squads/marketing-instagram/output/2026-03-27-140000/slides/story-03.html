<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #3D2B26;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 90px; position: relative;
    }
    .brand { position: absolute; top: 80px; right: 90px; font-family: 'Inter', sans-serif; font-size: 30px; color: #A89080; }
    .big-text {
      font-family: 'Inter', sans-serif;
      font-size: 46px; font-weight: 400;
      color: #FAF6F2; line-height: 1.55;
      max-width: 900px; margin-bottom: 52px;
      opacity: 0.9;
    }
    .big-text p { margin-bottom: 24px; }
    .big-text .accent { color: #C97D6E; font-weight: 500; opacity: 1; }
    .em-phrase {
      font-family: 'Playfair Display', serif;
      font-size: 56px; font-weight: 700; font-style: italic;
      color: #C97D6E; line-height: 1.3;
      max-width: 860px;
    }
  </style>
</head>
<body>
  <span class="brand">@lais_esteticista</span>
  <div class="big-text">
    <p>O frio seco retira a hidratação natural da pele.</p>
    <p>E ela <span class="accent">manda sinal</span>.</p>
    <p>O problema é que a gente normaliza.</p>
  </div>
  <p class="em-phrase">Sua pele não está te traindo.</p>
</body>
</html>
