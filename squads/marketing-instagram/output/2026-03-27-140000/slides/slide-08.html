<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #3D2B26;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 80px; position: relative;
    }
    .brand { position: absolute; top: 52px; right: 80px; font-family: 'Inter', sans-serif; font-size: 26px; color: #A89080; }
    h2 { font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 700; color: #FAF6F2; line-height: 1.3; max-width: 880px; margin-bottom: 36px; }
    h2 .accent { color: #C97D6E; }
    .divider { width: 60px; height: 3px; background: #C97D6E; margin-bottom: 40px; }
    .body-text { font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 400; color: #FAF6F2; line-height: 1.6; max-width: 900px; opacity: 0.9; }
    .body-text p { margin-bottom: 20px; }
    .body-text .accent { color: #C97D6E; font-weight: 500; opacity: 1; }
    .cta-box {
      border: 2px solid rgba(201,125,110,0.6);
      border-radius: 12px;
      padding: 36px 40px;
      margin-top: 40px;
      max-width: 900px;
    }
    .cta-text { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 400; color: rgba(250,246,242,0.85); line-height: 1.5; }
    .cta-text .accent { color: #C97D6E; font-weight: 500; }
  </style>
</head>
<body>
  <span class="brand">@lais_esteticista</span>
  <h2>Você também sente esses <span class="accent">sinais</span> no inverno?</h2>
  <div class="divider"></div>
  <div class="body-text">
    <p>Me conta aqui embaixo qual dessas sensações você mais conhece 💙</p>
  </div>
  <div class="cta-box">
    <p class="cta-text">E se tiver uma amiga que precisa ver isso, <span class="accent">manda pra ela agora</span> — ela vai agradecer.</p>
  </div>
</body>
</html>
