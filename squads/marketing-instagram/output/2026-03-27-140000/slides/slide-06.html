<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #3D2B26;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 80px; position: relative;
    }
    .brand { position: absolute; top: 52px; right: 80px; font-family: 'Inter', sans-serif; font-size: 26px; color: #A89080; }
    .step-num { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 500; color: #C97D6E; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px; }
    h2 { font-family: 'Playfair Display', serif; font-size: 54px; font-weight: 700; color: #FAF6F2; line-height: 1.25; max-width: 880px; margin-bottom: 32px; }
    h2 .accent { color: #C97D6E; }
    .divider { width: 60px; height: 3px; background: #C97D6E; margin-bottom: 40px; }
    .body-text { font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 400; color: #FAF6F2; line-height: 1.6; max-width: 900px; opacity: 0.9; }
    .body-text p { margin-bottom: 20px; }
    .body-text .accent { color: #C97D6E; font-weight: 500; opacity: 1; }
    .highlight {
      background: #C97D6E; color: #FAF6F2;
      font-family: 'Inter', sans-serif;
      font-size: 32px; font-weight: 500;
      padding: 22px 32px; border-radius: 8px;
      margin-top: 32px; display: inline-block;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <span class="brand">@lais_esteticista</span>
  <div class="step-num">Passo 02</div>
  <h2>Hidrate com a pele ainda úmida.</h2>
  <div class="divider"></div>
  <div class="body-text">
    <p>Logo após o banho, antes de secar completamente, aplique o hidratante.</p>
    <p>A pele úmida absorve <span class="accent">até 3x mais</span> os ativos do creme.</p>
    <p>É um <span class="accent">pequeno detalhe</span> que muda o resultado completamente.</p>
  </div>
  <div class="highlight">Você já fazia isso? Agora sabe o porquê. 💙</div>
</body>
</html>
