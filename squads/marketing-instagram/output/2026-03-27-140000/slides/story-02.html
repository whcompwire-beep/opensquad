<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #F5EDE3;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 90px; position: relative;
    }
    .brand { position: absolute; top: 80px; right: 90px; font-family: 'Inter', sans-serif; font-size: 30px; color: #A89080; }
    .label { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 500; color: #C97D6E; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 36px; }
    h2 { font-family: 'Playfair Display', serif; font-size: 62px; font-weight: 700; color: #2D2D2D; line-height: 1.3; max-width: 900px; margin-bottom: 40px; }
    h2 .accent { color: #C97D6E; }
    .divider { width: 60px; height: 3px; background: #C97D6E; margin-bottom: 44px; }
    .body-text { font-family: 'Inter', sans-serif; font-size: 42px; font-weight: 400; color: #2D2D2D; line-height: 1.55; max-width: 900px; }
    .body-text .accent { color: #C97D6E; font-weight: 500; }
    .body-text p { margin-bottom: 24px; }
  </style>
</head>
<body>
  <span class="brand">@lais_esteticista</span>
  <div class="label">você não está sozinha</div>
  <h2>A pele puxando, a descamação, a <span class="accent">vermelhidão</span>...</h2>
  <div class="divider"></div>
  <div class="body-text">
    <p>Não é exagero seu.</p>
    <p>É a <span class="accent">barreira da pele</span> pedindo socorro.</p>
  </div>
</body>
</html>
