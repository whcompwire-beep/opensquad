<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #C97D6E;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 80px; position: relative;
    }
    .brand { position: absolute; top: 52px; right: 80px; font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 400; color: rgba(250,246,242,0.6); }
    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 140px; font-weight: 700;
      color: rgba(250,246,242,0.25);
      line-height: 0.8;
      margin-bottom: 20px;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 58px; font-weight: 700;
      color: #FAF6F2; line-height: 1.3;
      max-width: 900px; margin-bottom: 40px;
    }
    h2 em { font-style: italic; }
    .divider { width: 80px; height: 3px; background: rgba(250,246,242,0.5); margin-bottom: 40px; }
    .body-text { font-family: 'Inter', sans-serif; font-size: 34px; font-weight: 400; color: rgba(250,246,242,0.85); line-height: 1.65; max-width: 900px; }
    .body-text p { margin-bottom: 20px; }
  </style>
</head>
<body>
  <span class="brand">@lais_esteticista</span>
  <div class="quote-mark">"</div>
  <h2>Sua pele <em>não está te traindo</em>.<br>Ela está pedindo cuidado.</h2>
  <div class="divider"></div>
  <div class="body-text">
    <p>Cada sinal que ela manda — o ressecamento, a vermelhidão, a descamação — é uma forma de comunicação.</p>
    <p>Quando você aprende a ouvir, deixa de combater a pele e começa a cuidar dela.</p>
    <p>E cuidar dela é <strong>cuidar de você mesma</strong>.</p>
  </div>
</body>
</html>
