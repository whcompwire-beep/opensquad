<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #F5EDE3;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 90px; position: relative;
    }
    .brand { position: absolute; top: 80px; right: 90px; font-family: 'Inter', sans-serif; font-size: 30px; color: #A89080; }
    .divider-top { width: 80px; height: 4px; background: #C97D6E; margin-bottom: 56px; }
    .main-text {
      font-family: 'Inter', sans-serif;
      font-size: 46px; font-weight: 400;
      color: #2D2D2D; line-height: 1.55;
      max-width: 900px; margin-bottom: 52px;
    }
    .main-text p { margin-bottom: 20px; }
    .main-text .accent { color: #C97D6E; font-weight: 500; }
    .cta-btn {
      background: #3D2B26; color: #FAF6F2;
      font-family: 'Inter', sans-serif;
      font-size: 38px; font-weight: 500;
      padding: 36px 52px; border-radius: 12px;
      line-height: 1.3; max-width: 900px;
      display: inline-block;
    }
    .cta-arrow {
      font-family: 'Inter', sans-serif;
      font-size: 30px; color: #A89080;
      margin-top: 36px;
    }
  </style>
</head>
<body>
  <span class="brand">@lais_esteticista</span>
  <div class="divider-top"></div>
  <div class="main-text">
    <p>Fui ao feed explicar o que está acontecendo e o que você pode fazer <span class="accent">ainda hoje</span> 💙</p>
  </div>
  <div class="cta-btn">Vai lá no post 👆<br>Tem tudo explicado lá.</div>
  <p class="cta-arrow">↑ deslize para cima</p>
</body>
</html>
