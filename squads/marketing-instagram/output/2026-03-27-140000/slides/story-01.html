<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #3D2B26;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px; text-align: center;
      position: relative;
    }
    .brand { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-family: 'Inter', sans-serif; font-size: 30px; color: #A89080; white-space: nowrap; }
    .dot { width: 16px; height: 16px; background: #C97D6E; border-radius: 50%; margin: 0 auto 52px auto; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 74px; font-weight: 700;
      color: #FAF6F2; line-height: 1.25;
      max-width: 900px;
    }
    h1 .accent { color: #C97D6E; }
    .swipe-hint { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); font-family: 'Inter', sans-serif; font-size: 28px; color: rgba(250,246,242,0.45); }
  </style>
</head>
<body>
  <span class="brand">@lais_esteticista</span>
  <div class="dot"></div>
  <h1>Você sente sua pele <span class="accent">mudando</span> no inverno?</h1>
  <span class="swipe-hint">toque para continuar</span>
</body>
</html>
