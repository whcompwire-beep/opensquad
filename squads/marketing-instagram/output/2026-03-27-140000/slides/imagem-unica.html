<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px; overflow: hidden;
      background: #F5EDE3;
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 80px;
      position: relative;
      text-align: center;
    }
    .brand { position: absolute; top: 48px; right: 72px; font-family: 'Inter', sans-serif; font-size: 26px; color: #A89080; }
    .top-accent { width: 80px; height: 4px; background: #C97D6E; margin: 0 auto 52px auto; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 68px; font-weight: 700;
      color: #2D2D2D; line-height: 1.25;
      max-width: 920px; margin-bottom: 36px;
    }
    h1 .accent { color: #C97D6E; }
    .bottom-accent { width: 80px; height: 4px; background: #C97D6E; margin: 0 auto 44px auto; }
    .subtitle {
      font-family: 'Playfair Display', serif;
      font-size: 52px; font-weight: 700; font-style: italic;
      color: #C97D6E; line-height: 1.3;
    }
  </style>
</head>
<body>
  <span class="brand">@lais_esteticista</span>
  <div class="top-accent"></div>
  <h1>Cuidar da sua pele no inverno não é <span class="accent">frescura</span>.</h1>
  <div class="bottom-accent"></div>
  <p class="subtitle">É amor próprio.</p>
</body>
</html>
