<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(170deg, #F9D4D0 0%, #E8B5B0 50%, #C38F8B 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
      text-align: center;
    }
    .top-handle { position: absolute; top: 60px; left: 0; right: 0; text-align: center; font-size: 30px; font-weight: 500; color: rgba(255,255,255,0.75); letter-spacing: 2px; }
    .tag { font-size: 26px; font-weight: 700; color: rgba(255,255,255,0.8); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }
    .accent-line { width: 60px; height: 3px; background: rgba(255,255,255,0.5); margin: 0 auto 56px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 80px; font-weight: 700;
      color: #FFFFFF; line-height: 1.2;
      margin-bottom: 44px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.15);
    }
    .sub {
      font-size: 42px; font-weight: 400;
      color: rgba(255,255,255,0.9); line-height: 1.6;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      margin-bottom: 60px;
    }
    .cta {
      font-size: 36px; font-weight: 600;
      color: rgba(255,255,255,0.88); letter-spacing: 2px;
    }
    .brand { position: absolute; bottom: 52px; right: 60px; font-size: 28px; font-weight: 500; color: rgba(255,255,255,0.8); letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="top-handle">@lais_esteticista</div>
  <div class="tag">Lipedema</div>
  <div class="accent-line"></div>
  <h1>Você faz drenagem<br>e ainda sente dor<br>e peso nos membros?</h1>
  <p class="sub">Pode não ser falta de resultado.<br>Pode ser <em>técnica errada para o seu caso</em>.</p>
  <p class="cta">Assista. Isso muda o protocolo. 👇</p>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
