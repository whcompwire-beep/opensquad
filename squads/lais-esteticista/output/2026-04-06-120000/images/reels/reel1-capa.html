<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(175deg, #FDFAF7 0%, #EDE0CF 55%, #D4B99A 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
      text-align: center;
    }
    .top-handle { position: absolute; top: 60px; left: 0; right: 0; text-align: center; font-size: 30px; font-weight: 500; color: #BDA78D; letter-spacing: 2px; }
    .tag { font-size: 26px; font-weight: 700; color: #AA9176; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }
    .accent-line { width: 60px; height: 3px; background: #BDA78D; margin: 0 auto 56px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 82px; font-weight: 700;
      color: #2C2C2C; line-height: 1.2;
      margin-bottom: 44px;
    }
    .sub {
      font-size: 42px; font-weight: 400;
      color: #6B5C50; line-height: 1.6;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      margin-bottom: 60px;
    }
    .sub strong { font-style: normal; color: #AA9176; font-weight: 700; }
    .cta {
      font-size: 36px; font-weight: 600;
      color: #AA9176; letter-spacing: 2px;
    }
    .brand { position: absolute; bottom: 52px; right: 60px; font-size: 28px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="top-handle">@lais_esteticista</div>
  <div class="tag">Lipedema</div>
  <div class="accent-line"></div>
  <h1>"Tentei emagrecer<br>a vida inteira.<br>Nunca funcionou."</h1>
  <p class="sub">Ela tem razão.<br>E eu vou te explicar <strong>por quê</strong>.</p>
  <p class="cta">Assista até o final.</p>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
