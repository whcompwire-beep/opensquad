<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
    }
    .top-handle { display: none; }
    .tag { font-size: 24px; font-weight: 700; color: #AA9176; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 32px; text-align: center; width: 100%; }
    .accent-line { width: 60px; height: 3px; background: #BDA78D; margin: 0 auto 52px; }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 64px; font-weight: 700;
      color: #2C2C2C; line-height: 1.2;
      margin-bottom: 52px; text-align: center; width: 100%;
    }
    .list { width: 100%; background: #FFFFFF; border-radius: 20px; padding: 52px 60px; box-shadow: 0 2px 20px rgba(170,145,118,0.10); }
    .item {
      font-size: 40px; font-weight: 500;
      color: #2C2C2C; line-height: 1.5;
      padding: 18px 0;
      border-bottom: 1px solid #EDE5DB;
      display: flex; align-items: flex-start; gap: 20px;
    }
    .item:last-child { border-bottom: none; }
    .arrow { color: #AA9176; font-weight: 700; flex-shrink: 0; }
    .brand { position: absolute; bottom: 52px; left: 0; right: 0; text-align: center; font-size: 28px; font-weight: 500; color: #BDA78D; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="top-handle"></div>
  <div class="tag">Revelação</div>
  <div class="accent-line"></div>
  <h2>MITO. 🔴</h2>
  <div class="list">
    <div class="item"><span class="arrow">✗</span> A drenagem linfática não emagrece.</div>
    <div class="item"><span class="arrow">✓</span> Ela reduz dor, inflamação e pressão nos membros.</div>
    <div class="item"><span class="arrow">✓</span> O objetivo no lipedema é QUALIDADE DE VIDA — não estética.</div>
    <div class="item"><span class="arrow">→</span> Essa diferença muda o protocolo e o resultado esperado.</div>
  </div>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
