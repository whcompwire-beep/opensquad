<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(160deg, #E8D5BE 0%, #C9A882 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
      text-align: center;
    }
    .handle { position: absolute; bottom: 52px; left: 0; right: 0; text-align: center; font-size: 28px; font-weight: 500; color: rgba(255,255,255,0.7); letter-spacing: 2px; }
    .card {
      background: #FFFFFF;
      border-radius: 24px; padding: 72px 64px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex; flex-direction: column; align-items: center;
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 160px; font-weight: 700;
      color: #AA9176; line-height: 1;
      margin-bottom: 8px;
    }
    .stat-unit {
      font-size: 44px; font-weight: 700;
      color: #AA9176; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 36px;
    }
    .divider { width: 50px; height: 2px; background: #BDA78D; margin: 0 auto 36px; }
    .stat-label {
      font-family: 'Playfair Display', serif;
      font-size: 46px; font-weight: 700;
      color: #2C2C2C; line-height: 1.35;
      margin-bottom: 32px;
    }
    .stat-sub {
      font-size: 36px; font-weight: 400;
      color: #6B5C50; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="handle">@lais_esteticista</div>
  <div class="card">
    <div class="stat-num">+10</div>
    <div class="stat-unit">anos</div>
    <div class="divider"></div>
    <p class="stat-label">tempo médio até o<br>diagnóstico correto<br>de lipedema</p>
    <p class="stat-sub">Se você já passou por médicos<br>que não acreditaram —<br>essa é a razão.<br>Não é você.</p>
  </div>
</body>
</html>
