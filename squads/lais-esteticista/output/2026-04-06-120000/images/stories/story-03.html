<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(155deg, #F9D4D0 0%, #E8B5B0 50%, #C38F8B 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
      text-align: center;
    }
    .handle { position: absolute; bottom: 52px; left: 0; right: 0; text-align: center; font-size: 28px; font-weight: 500; color: rgba(255,255,255,0.75); letter-spacing: 2px; }
    .tag { font-size: 26px; font-weight: 700; color: rgba(255,255,255,0.8); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }
    .accent-line { width: 60px; height: 3px; background: rgba(255,255,255,0.5); margin: 0 auto 56px; }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 700;
      color: #FFFFFF; line-height: 1.2;
      margin-bottom: 44px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.15);
    }
    .sub {
      font-size: 40px; font-weight: 400;
      color: rgba(255,255,255,0.9); line-height: 1.65;
      margin-bottom: 64px;
    }
    .cta-btn {
      background: #FFFFFF;
      border-radius: 60px; padding: 32px 80px;
      font-size: 38px; font-weight: 700;
      color: #C38F8B; letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="handle">@lais_esteticista</div>
  <div class="tag">Drenagem Linfática</div>
  <div class="accent-line"></div>
  <h2>Faço avaliação do<br>seu protocolo atual.</h2>
  <p class="sub">Se está no caminho certo,<br>te digo.<br>Se precisa ajustar,<br>a gente ajusta.<br><br>Sem compromisso.</p>
  <div class="cta-btn">Enviar mensagem</div>
</body>
</html>
