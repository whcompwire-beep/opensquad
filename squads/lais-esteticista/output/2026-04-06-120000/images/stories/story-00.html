<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(175deg, #FDFAF7 0%, #F5E8DC 60%, #EDD5C0 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
      text-align: center;
    }
    .handle { position: absolute; bottom: 52px; left: 0; right: 0; text-align: center; font-size: 28px; font-weight: 500; color: #BDA78D; letter-spacing: 2px; }
    .tag { font-size: 26px; font-weight: 700; color: #AA9176; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }
    .accent-line { width: 60px; height: 3px; background: #BDA78D; margin: 0 auto 60px; }
    .big-num {
      font-family: 'Playfair Display', serif;
      font-size: 220px; font-weight: 700;
      color: #AA9176; line-height: 0.85;
      margin-bottom: 44px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 64px; font-weight: 700;
      color: #2C2C2C; line-height: 1.25;
      margin-bottom: 48px;
    }
    .sub {
      font-size: 40px; font-weight: 400;
      color: #6B5C50; line-height: 1.6;
    }
    .sub em { font-style: italic; color: #AA9176; }
  </style>
</head>
<body>
  <div class="handle">@lais_esteticista</div>
  <div class="tag">Lipedema</div>
  <div class="accent-line"></div>
  <div class="big-num">90%</div>
  <h1>das mulheres com lipedema<br>receberam diagnóstico errado<br>antes de chegar ao correto.</h1>
  <p class="sub">Não por falta de cuidado.<br>Por falta de <em>reconhecimento</em><br>de uma condição real.</p>
</body>
</html>
