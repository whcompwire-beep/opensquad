<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 80px;
      position: relative;
      text-align: center;
    }
    .bg-deco {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, #F9D4D0 0%, transparent 65%);
      opacity: 0.4;
    }
    .content { position: relative; z-index: 1; }
    .open-quote {
      font-family: 'Playfair Display', serif;
      font-size: 140px; color: #C38F8B;
      line-height: 0.6; margin-bottom: 28px; opacity: 0.35;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 64px; font-weight: 700;
      color: #2C2C2C; line-height: 1.3;
      margin-bottom: 32px;
    }
    h1 em { font-style: italic; color: #C38F8B; font-weight: 400; }
    .accent-line { width: 50px; height: 2px; background: #C38F8B; margin: 0 auto 32px; }
    .sub { font-size: 38px; font-weight: 400; color: #6B5C50; line-height: 1.55; }
    .brand { position: absolute; bottom: 36px; right: 52px; font-size: 26px; font-weight: 500; color: #BDA78D; letter-spacing: 2px; z-index: 1; }
  </style>
</head>
<body>
  <div class="bg-deco"></div>
  <div class="content">
    <div class="open-quote">"</div>
    <h1>O lipedema não<br>aparece na balança.<br>Aparece na <em>dor</em> —</h1>
    <div class="accent-line"></div>
    <p class="sub">e no cansaço de não<br>ser acreditada.</p>
  </div>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
