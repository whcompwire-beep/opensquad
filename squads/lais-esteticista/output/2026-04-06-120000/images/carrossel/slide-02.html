<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 90px 90px;
      position: relative;
    }
    .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: #AA9176; }
    .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; background: #AA9176; }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 68px; font-weight: 700;
      color: #2C2C2C; line-height: 1.2;
      margin-bottom: 52px; width: 100%;
    }
    .list {
      width: 100%; background: #FFFFFF;
      border-radius: 16px; padding: 52px 60px;
      box-shadow: 0 2px 20px rgba(170,145,118,0.10);
      margin-bottom: 44px;
    }
    .item {
      font-size: 40px; font-weight: 500;
      color: #2C2C2C; line-height: 1.5;
      padding: 16px 0;
      border-bottom: 1px solid #EDE5DB;
      display: flex; align-items: flex-start; gap: 20px;
    }
    .item:last-child { border-bottom: none; }
    .arrow { color: #AA9176; font-weight: 700; flex-shrink: 0; }
    .note {
      font-size: 38px; font-style: italic;
      color: #AA9176; font-family: 'Playfair Display', serif;
    }
    .brand { position: absolute; bottom: 36px; right: 60px; font-size: 26px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
    .slide-num { position: absolute; bottom: 36px; left: 60px; font-size: 24px; color: #BDA78D; }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <h2>O que é lipedema?</h2>
  <div class="list">
    <div class="item"><span class="arrow">→</span> Acúmulo patológico de tecido adiposo</div>
    <div class="item"><span class="arrow">→</span> Predominante em mulheres</div>
    <div class="item"><span class="arrow">→</span> Simétrico — afeta os dois lados do corpo</div>
    <div class="item"><span class="arrow">→</span> Dói ao toque, mesmo levemente</div>
    <div class="item"><span class="arrow">→</span> Não responde a exercício nem a dieta</div>
  </div>
  <p class="note">Não é fraqueza. É fisiologia.</p>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-num">2/5</span>
  <div class="bottom-bar"></div>
</body>
</html>
