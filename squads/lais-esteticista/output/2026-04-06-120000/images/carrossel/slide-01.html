<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: linear-gradient(155deg, #FDFAF7 0%, #F0E8DE 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px 80px;
      position: relative;
      text-align: center;
    }
    .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: #AA9176; }
    .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; background: #AA9176; }
    .tag {
      font-size: 24px; font-weight: 700; color: #AA9176;
      letter-spacing: 5px; text-transform: uppercase;
      margin-bottom: 32px;
    }
    .accent-line { width: 60px; height: 3px; background: #BDA78D; margin: 0 auto 56px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 78px; font-weight: 700;
      color: #2C2C2C; line-height: 1.2;
      margin-bottom: 44px;
    }
    .sub {
      font-size: 40px; font-weight: 400;
      color: #6B5C50; line-height: 1.65;
      margin-bottom: 52px;
    }
    .sub em { font-style: normal; color: #AA9176; font-weight: 600; }
    .cta {
      font-size: 36px; font-weight: 600;
      color: #AA9176; letter-spacing: 1px;
    }
    .brand { position: absolute; bottom: 36px; right: 60px; font-size: 26px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
    .slide-num { position: absolute; bottom: 36px; left: 60px; font-size: 24px; color: #BDA78D; }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="tag">Lipedema</div>
  <div class="accent-line"></div>
  <h1>90% das mulheres<br>com lipedema levam<br>mais de 10 anos<br>para o diagnóstico certo.</h1>
  <p class="sub">Não porque a condição é rara.<br>Porque é <em>confundida com obesidade</em> —<br>pelo médico, pela família e<br>pela própria paciente.</p>
  <p class="cta">Arrasta para entender o que pode estar acontecendo no seu corpo. 👉</p>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-num">1/5</span>
  <div class="bottom-bar"></div>
</body>
</html>
