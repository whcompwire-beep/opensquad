<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #AA9176;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px 90px;
      position: relative;
      text-align: center;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 70px; font-weight: 700;
      color: #FFFFFF; line-height: 1.25;
      margin-bottom: 48px;
    }
    .list { margin-bottom: 52px; }
    .list p {
      font-size: 44px; font-weight: 400;
      color: rgba(255,255,255,0.92);
      line-height: 2; font-style: italic;
      font-family: 'Playfair Display', serif;
    }
    .list p strong { font-style: normal; font-weight: 700; color: #FFFFFF; }
    .accent-line { width: 60px; height: 2px; background: rgba(255,255,255,0.5); margin: 0 auto 44px; }
    .cta-box {
      background: #FFFFFF;
      border-radius: 60px; padding: 28px 64px;
      font-size: 36px; font-weight: 700;
      color: #AA9176; letter-spacing: 1px;
      margin-bottom: 28px;
    }
    .handle { font-size: 30px; font-weight: 500; color: rgba(255,255,255,0.85); letter-spacing: 2px; }
    .slide-num { position: absolute; bottom: 36px; left: 60px; font-size: 24px; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <h2>Lipedema não tem cura.<br>Mas tem manejo —<br>e o manejo muda<br>a qualidade de vida.</h2>
  <div class="list">
    <p>Você não falhou.</p>
    <p>Você só ainda não encontrou<br>o protocolo certo<br>para o seu caso.</p>
  </div>
  <div class="accent-line"></div>
  <div class="cta-box">Salva. Manda para quem está nessa luta. 💛</div>
  <p class="handle">@lais_esteticista</p>
  <span class="slide-num">5/5</span>
</body>
</html>
