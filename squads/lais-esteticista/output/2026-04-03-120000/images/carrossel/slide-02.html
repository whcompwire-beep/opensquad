<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px 90px;
      position: relative;
    }
    .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: #AA9176; }
    .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; background: #AA9176; }

    .tag {
      font-size: 24px; font-weight: 700;
      color: #AA9176; letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 28px;
      text-align: center;
    }
    .accent-line { width: 60px; height: 3px; background: #BDA78D; margin: 0 auto 56px; }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 74px; font-weight: 700;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 56px;
    }
    h2 span { color: #AA9176; }

    .cards {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 40px 52px;
      display: flex;
      align-items: center;
      gap: 36px;
      box-shadow: 0 2px 16px rgba(170,145,118,0.10);
    }
    .card-num {
      font-family: 'Playfair Display', serif;
      font-size: 52px; font-weight: 700;
      color: #BDA78D;
      flex-shrink: 0;
      width: 52px;
      text-align: center;
    }
    .card-text {
      font-size: 40px; font-weight: 500;
      color: #2C2C2C;
      line-height: 1.4;
    }
    .card-text strong { color: #AA9176; }

    .brand { position: absolute; bottom: 36px; right: 60px; font-size: 26px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
    .slide-num { position: absolute; bottom: 36px; left: 60px; font-size: 24px; color: #BDA78D; }
  </style>
</head>
<body>
  <div class="top-bar"></div>

  <div class="tag">A resposta</div>
  <div class="accent-line"></div>
  <h2>O laser Lavieen<br>resolve os <span>3</span>.</h2>

  <div class="cards">
    <div class="card">
      <div class="card-num">1</div>
      <div class="card-text">Tecnologia <strong>fracionada</strong> — age em profundidade sem destruir a superfície</div>
    </div>
    <div class="card">
      <div class="card-num">2</div>
      <div class="card-text">Recuperação em <strong>2 a 4 dias</strong> — você não precisa sumir</div>
    </div>
    <div class="card">
      <div class="card-num">3</div>
      <div class="card-text">Protocolo <strong>personalizado</strong> para a sua pele, não genérico</div>
    </div>
  </div>

  <span class="brand">@lais_esteticista</span>
  <span class="slide-num">2/4</span>
  <div class="bottom-bar"></div>
</body>
</html>
