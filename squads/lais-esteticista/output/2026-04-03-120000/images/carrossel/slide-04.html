<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      font-family: 'Lato', sans-serif;
      position: relative;
    }
    .photo-bg {
      position: absolute; inset: 0;
      background: url('http://localhost:8765/lais-lavieen.jpeg') center top / cover no-repeat;
    }
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.30) 0%,
        rgba(0,0,0,0.18) 30%,
        rgba(0,0,0,0.65) 65%,
        rgba(0,0,0,0.82) 100%
      );
    }
    .top-handle {
      position: absolute; top: 48px; left: 0; right: 0;
      text-align: center;
      font-size: 28px; font-weight: 500;
      color: rgba(255,255,255,0.88);
      letter-spacing: 2px;
      z-index: 1;
    }
    .content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 80px 100px;
      z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .tag {
      font-size: 24px; font-weight: 700;
      color: rgba(255,255,255,0.75);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .accent-line { width: 50px; height: 2px; background: rgba(255,255,255,0.5); margin: 0 auto 36px; }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 68px; font-weight: 700;
      color: #FFFFFF;
      line-height: 1.2;
      margin-bottom: 28px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .sub {
      font-size: 36px; font-weight: 400;
      color: rgba(255,255,255,0.88);
      line-height: 1.5;
      margin-bottom: 52px;
    }
    .brand { position: absolute; bottom: 36px; right: 60px; font-size: 26px; font-weight: 500; color: rgba(255,255,255,0.8); letter-spacing: 2px; z-index: 1; }
    .slide-num { position: absolute; bottom: 36px; left: 60px; font-size: 24px; color: rgba(255,255,255,0.6); z-index: 1; }
    .cta-btn {
      background: #C38F8B;
      color: #FFFFFF;
      border-radius: 60px;
      padding: 30px 72px;
      font-size: 38px; font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="photo-bg"></div>
  <div class="overlay"></div>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-num">4/4</span>
  <div class="content">
    <div class="tag">Laser Lavieen</div>
    <div class="accent-line"></div>
    <h2>Quer saber se o Lavieen<br>é para você?</h2>
    <p class="sub">Faço avaliação personalizada.<br>Vamos encontrar o caminho<br>certo para a sua pele.</p>
    <div class="cta-btn">Enviar mensagem</div>
  </div>
</body>
</html>
