<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,600&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(160deg, #FFFFFF 0%, #F9D4D0 50%, #C38F8B 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
      text-align: center;
    }
    .reel-tag {
      position: absolute;
      top: 60px; left: 0; right: 0;
      text-align: center;
      font-size: 28px; font-weight: 700;
      color: #A16C67;
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .age-badge {
      background: #FFFFFF;
      border-radius: 60px;
      padding: 20px 52px;
      font-size: 36px; font-weight: 700;
      color: #C38F8B;
      letter-spacing: 2px;
      margin-bottom: 56px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 80px; font-weight: 700;
      color: #2C2C2C;
      line-height: 1.15;
      margin-bottom: 48px;
    }
    .sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 48px;
      color: #FFFFFF;
      line-height: 1.5;
      margin-bottom: 0;
    }
    .bottom-handle {
      position: absolute;
      bottom: 60px; left: 0; right: 0;
      text-align: center;
      font-size: 32px; font-weight: 500;
      color: rgba(255,255,255,0.9);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="reel-tag">Laser Lavieen</div>
  <div class="age-badge">Depois dos 30</div>
  <h1>Sua pele começa<br>a pedir algo que<br>creme nenhum<br>entrega.</h1>
  <p class="sub">Skincare mantém.<br>Laser restaura.</p>
  <div class="bottom-handle">@lais_esteticista</div>
</body>
</html>
