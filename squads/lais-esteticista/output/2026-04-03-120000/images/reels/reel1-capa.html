<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,600&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(160deg, #F9D4D0 0%, #FFFFFF 60%, #F9D4D0 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
      text-align: center;
    }
    .reel-tag {
      position: absolute;
      top: 60px; left: 0; right: 0;
      text-align: center;
      font-size: 28px; font-weight: 700;
      color: #C38F8B;
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .deco-line {
      width: 1px; height: 160px;
      background: linear-gradient(to bottom, transparent, #C38F8B, transparent);
      margin: 0 auto 60px;
    }
    .eyebrow {
      font-size: 32px; font-weight: 500;
      color: #C38F8B;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 84px; font-weight: 700;
      color: #2C2C2C;
      line-height: 1.15;
      margin-bottom: 48px;
    }
    .sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 50px;
      color: #A16C67;
      line-height: 1.5;
      margin-bottom: 80px;
    }
    .bottom-handle {
      position: absolute;
      bottom: 60px; left: 0; right: 0;
      text-align: center;
      font-size: 32px; font-weight: 500;
      color: #C38F8B;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="reel-tag">Transformação Real</div>
  <div class="deco-line"></div>
  <div class="eyebrow">História de Paciente</div>
  <h1>Ela cuidava<br>da pele.</h1>
  <p class="sub">Mas a pele não acompanhava<br>como ela se sentia.</p>
  <div class="bottom-handle">@lais_esteticista</div>
</body>
</html>
