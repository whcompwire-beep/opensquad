<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px; overflow: hidden;
      background: #FFFFFF;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 80px;
      position: relative;
      text-align: center;
    }
    .border-frame {
      position: absolute; inset: 20px;
      border: 2px solid #F9D4D0;
      border-radius: 4px;
      pointer-events: none;
    }
    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 140px;
      color: #F9D4D0;
      line-height: 0.6;
      margin-bottom: 40px;
    }
    .accent-line {
      width: 60px; height: 3px;
      background: #C38F8B;
      margin: 0 auto 52px;
    }
    blockquote {
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      font-style: italic;
      color: #2C2C2C;
      line-height: 1.4;
      margin-bottom: 48px;
      max-width: 860px;
    }
    blockquote span {
      color: #C38F8B;
    }
    .accent-line-bottom {
      width: 60px; height: 3px;
      background: #C38F8B;
      margin: 0 auto 40px;
    }
    .brand {
      font-size: 28px; font-weight: 500;
      color: #C38F8B;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <div class="border-frame"></div>
  <div class="quote-mark">"</div>
  <div class="accent-line"></div>
  <blockquote>Cuidar da sua pele<br>não é vaidade.<br>É o começo de<br><span>como você se enxerga.</span></blockquote>
  <div class="accent-line-bottom"></div>
  <div class="brand">@lais_esteticista</div>
</body>
</html>
