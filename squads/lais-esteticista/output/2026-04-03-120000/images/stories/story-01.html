<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
      text-align: center;
    }
    .top-handle { position: absolute; top: 60px; left: 0; right: 0; text-align: center; font-size: 30px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
    .tag { font-size: 28px; font-weight: 700; color: #AA9176; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
    .accent-line { width: 60px; height: 3px; background: #BDA78D; margin: 0 auto 56px; }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 64px; font-weight: 700;
      color: #2C2C2C;
      line-height: 1.25;
      margin-bottom: 60px;
    }
    .items {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 52px 64px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(170,145,118,0.1);
    }
    .item {
      display: flex; align-items: flex-start; gap: 24px;
      padding: 24px 0;
      border-bottom: 1px solid #F2EBE3;
      text-align: left;
    }
    .item:last-child { border-bottom: none; }
    .check { font-size: 40px; line-height: 1.4; flex-shrink: 0; }
    .item-text { font-size: 40px; font-weight: 500; color: #2C2C2C; line-height: 1.4; }
    .item-text strong { color: #AA9176; }
  </style>
</head>
<body>
  <div class="top-handle">@lais_esteticista</div>
  <div class="tag">Laser Lavieen</div>
  <div class="accent-line"></div>
  <h2>É diferente do que<br>você imagina.</h2>
  <div class="items">
    <div class="item"><span class="check">✔️</span><div class="item-text">Recuperação em <strong>2 a 4 dias</strong></div></div>
    <div class="item"><span class="check">✔️</span><div class="item-text">Trata <strong>manchas, poros e textura</strong></div></div>
    <div class="item"><span class="check">✔️</span><div class="item-text">Protocolo <strong>personalizado</strong> para a sua pele</div></div>
  </div>
</body>
</html>
