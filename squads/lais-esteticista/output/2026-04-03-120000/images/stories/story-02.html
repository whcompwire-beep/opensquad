<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,600&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
      text-align: center;
    }
    .bg-deco {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, #F9D4D0 0%, transparent 60%);
      opacity: 0.55;
      pointer-events: none;
    }
    .top-handle {
      position: absolute; top: 60px; left: 0; right: 0;
      text-align: center;
      font-size: 30px; font-weight: 500;
      color: #BDA78D;
      letter-spacing: 2px;
      z-index: 1;
    }
    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
    }
    .open-quote {
      font-family: 'Playfair Display', serif;
      font-size: 160px;
      color: #C38F8B;
      line-height: 0.6;
      margin-bottom: 40px;
      opacity: 0.4;
    }
    blockquote {
      font-family: 'Playfair Display', serif;
      font-size: 68px;
      font-style: italic;
      color: #2C2C2C;
      line-height: 1.4;
      margin-bottom: 52px;
    }
    blockquote em {
      font-style: normal;
      color: #C38F8B;
    }
    .accent-line {
      width: 60px; height: 2px;
      background: #C38F8B;
      margin: 0 auto 48px;
    }
    .sub {
      font-size: 38px; font-weight: 400;
      color: #6B5C50;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="bg-deco"></div>
  <div class="top-handle">@lais_esteticista</div>
  <div class="content">
    <div class="open-quote">"</div>
    <blockquote>Aqui a gente cuida<br>da sua pele<br>com <em>estratégia</em>,<br><em>cuidado</em> e<br><em>olhar clínico</em>.</blockquote>
    <div class="accent-line"></div>
    <p class="sub">Porque sua pele merece<br>mais do que uma rotina.<br>Merece um protocolo.</p>
  </div>
</body>
</html>
