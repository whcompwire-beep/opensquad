<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(180deg, #F9D4D0 0%, #FFFFFF 50%, #F9D4D0 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
      text-align: center;
    }
    .top-handle {
      position: absolute; top: 60px; left: 0; right: 0;
      text-align: center;
      font-size: 30px; font-weight: 500; color: #C38F8B; letter-spacing: 2px;
    }
    .emoji { font-size: 100px; margin-bottom: 56px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 700;
      color: #2C2C2C;
      line-height: 1.25;
      margin-bottom: 40px;
    }
    .sub {
      font-size: 42px; font-weight: 400;
      color: #6B5C50;
      line-height: 1.5;
      margin-bottom: 80px;
    }
    .poll-box {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 36px 60px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(195,143,139,0.15);
    }
    .poll-title {
      font-size: 34px; font-weight: 600; color: #6B5C50;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }
    .poll-options {
      display: flex; gap: 24px;
    }
    .poll-opt {
      flex: 1;
      background: #F9D4D0;
      border-radius: 12px;
      padding: 28px 0;
      font-size: 40px; font-weight: 700;
      color: #A16C67;
      text-align: center;
    }
    .poll-opt.no {
      background: #F2EBE3;
      color: #BDA78D;
    }
  </style>
</head>
<body>
  <div class="top-handle">@lais_esteticista</div>

  <h1>Você já adiou cuidar<br>da sua pele por medo<br>do laser?</h1>
  <p class="sub">Responde aqui — quero saber!</p>
  <div class="poll-box">
    <div class="poll-title">Enquete</div>
    <div class="poll-options">
      <div class="poll-opt">SIM</div>
      <div class="poll-opt no">NÃO</div>
    </div>
  </div>
</body>
</html>
