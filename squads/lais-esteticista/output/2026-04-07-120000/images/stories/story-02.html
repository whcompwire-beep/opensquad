<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(160deg, #E8D5BE 0%, #C9A882 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
      text-align: center;
    }
    .handle {
      position: absolute; bottom: 52px; left: 0; right: 0;
      text-align: center; font-size: 28px; font-weight: 500;
      color: rgba(255,255,255,0.7); letter-spacing: 2px;
    }
    .card {
      background: #FFFFFF;
      border-radius: 24px; padding: 72px 64px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      display: flex; flex-direction: column; align-items: center;
    }
    .tag {
      font-size: 24px; font-weight: 700; color: #AA9176;
      letter-spacing: 4px; text-transform: uppercase;
      margin-bottom: 36px;
    }
    .divider { width: 50px; height: 2px; background: #BDA78D; margin: 0 auto 44px; }
    .main-text {
      font-family: 'Playfair Display', serif;
      font-size: 52px; font-weight: 700;
      color: #2C2C2C; line-height: 1.3;
      margin-bottom: 36px;
    }
    .sub-text {
      font-size: 36px; font-weight: 400;
      color: #6B5C50; line-height: 1.6;
    }
    .sub-text em { font-style: italic; color: #AA9176; }
  </style>
</head>
<body>
  <div class="handle">@lais_esteticista</div>
  <div class="card">
    <div class="tag">Importante saber</div>
    <div class="divider"></div>
    <p class="main-text">Lipedema não some com o tempo —<br>mas dá pra viver<br><em>muito melhor</em> com ele.</p>
    <p class="sub-text">Com sessões regulares,<br>a drenagem linfática ajuda<br>a reduzir o desconforto<br>e trazer mais leveza no dia a dia.</p>
  </div>
</body>
</html>
