<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(180deg, #C18881 0%, #A16C67 40%, #2C1A18 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: flex-end; align-items: flex-start;
      padding: 0 80px 120px 80px;
      position: relative;
    }
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 30%, rgba(0,0,0,0.7) 100%);
    }
    .content { position: relative; z-index: 2; width: 100%; }
    .tag {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 100px;
      padding: 12px 30px;
      font-size: 30px; font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .accent-line { width: 60px; height: 4px; background: #F9D4D0; margin-bottom: 40px; border-radius: 2px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 88px; font-weight: 700;
      color: #FFFFFF;
      line-height: 1.2;
      margin-bottom: 50px;
    }
    h1 em { font-style: italic; color: #F9D4D0; }
    .sub {
      font-size: 44px; font-weight: 400;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
      margin-bottom: 60px;
    }
    .brand {
      font-size: 34px; font-weight: 600;
      color: #F9D4D0;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="content">
    <span class="tag">Transformação Real</span>
    <div class="accent-line"></div>
    <h1>Ela evitava colocar short.<br>Não era <em>vaidade</em>.<br>Era vergonha.</h1>
    <p class="sub">A história que muitas de nós conhecemos bem.</p>
    <div class="brand">@lais_esteticista</div>
  </div>
</body>
</html>
