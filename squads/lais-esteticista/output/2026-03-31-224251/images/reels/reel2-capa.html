<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(160deg, #E7D5BF 0%, #BDA78D 60%, #AA9176 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 100px 80px;
      position: relative;
    }
    .deco-circle {
      position: absolute; top: -100px; right: -100px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .deco-circle-2 {
      position: absolute; bottom: -80px; left: -80px;
      width: 380px; height: 380px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .tag {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      border-radius: 100px;
      padding: 12px 32px;
      font-size: 28px; font-weight: 600;
      color: #4A3F35;
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 60px;
    }
    .accent-line { width: 80px; height: 5px; background: #AA9176; margin-bottom: 50px; border-radius: 2px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 82px; font-weight: 700;
      color: #2C2C2C;
      line-height: 1.25;
      margin-bottom: 50px;
    }
    .highlight {
      font-family: 'Playfair Display', serif;
      font-size: 52px; font-style: italic;
      color: #6B5B4E;
      line-height: 1.5;
      margin-bottom: 80px;
    }
    .brand {
      font-size: 34px; font-weight: 700;
      color: #AA9176;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="deco-circle"></div>
  <div class="deco-circle-2"></div>
  <span class="tag">Depilação a Laser</span>
  <div class="accent-line"></div>
  <h1>Você não precisa depilar para sempre do jeito que dói.</h1>
  <p class="highlight">Existe uma solução que age na raiz.</p>
  <div class="brand">@lais_esteticista</div>
</body>
</html>
