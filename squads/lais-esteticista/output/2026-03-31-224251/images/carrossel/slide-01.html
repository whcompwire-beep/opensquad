<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: linear-gradient(160deg, #E7D5BF 0%, #D2BBA0 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px 80px;
      position: relative;
    }
    .top-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: #AA9176;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 40px;
      opacity: 0.9;
    }
    .question-mark {
      font-family: 'Playfair Display', serif;
      font-size: 160px;
      font-weight: 700;
      color: #AA9176;
      opacity: 0.15;
      position: absolute;
      top: 60px;
      right: 60px;
      line-height: 1;
    }
    .accent-line {
      width: 80px; height: 4px;
      background: #AA9176;
      margin-bottom: 50px;
      border-radius: 2px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 700;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 40px;
    }
    .subtitle {
      font-size: 40px; font-weight: 400;
      color: #6B5B4E;
      text-align: center;
      line-height: 1.5;
      font-style: italic;
    }
    .brand {
      position: absolute;
      bottom: 52px; right: 60px;
      font-family: 'Lato', sans-serif;
      font-size: 26px; font-weight: 600;
      color: #AA9176;
      letter-spacing: 1px;
    }
    .slide-num {
      position: absolute;
      bottom: 52px; left: 60px;
      font-size: 24px; font-weight: 400;
      color: #BDA78D;
    }
  </style>
</head>
<body>
  <div class="top-accent"></div>
  <div class="question-mark">?</div>
  <div class="accent-line"></div>
  <h1>Você ainda tem medo de depilação a laser por causa de histórias antigas?</h1>
  <p class="subtitle">A resposta honesta que você merece ouvir.</p>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-num">1 / 6</span>
</body>
</html>
