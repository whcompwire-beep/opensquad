<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: linear-gradient(160deg, #D2BBA0 0%, #AA9176 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px 80px;
      position: relative;
    }
    .accent-line { width: 80px; height: 4px; background: #FFFFFF; opacity: 0.6; margin-bottom: 50px; border-radius: 2px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 70px; font-weight: 700;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 50px;
    }
    .cta-box {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 16px;
      padding: 40px 60px;
      text-align: center;
    }
    .cta-main {
      font-size: 46px; font-weight: 700;
      color: #FFFFFF;
      line-height: 1.4;
      margin-bottom: 20px;
    }
    .cta-sub {
      font-size: 36px; font-weight: 400;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
      font-style: italic;
    }
    .brand {
      position: absolute; bottom: 52px; right: 60px;
      font-size: 28px; font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: 1px;
    }
    .slide-num {
      position: absolute; bottom: 52px; left: 60px;
      font-size: 24px; color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="accent-line"></div>
  <h1>Cada pele é única.<br>O protocolo certo começa<br>com uma avaliação.</h1>
  <div class="cta-box">
    <div class="cta-main">Salva esse post.</div>
    <div class="cta-sub">Leva para a sua consulta.</div>
  </div>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-num">6 / 6</span>
</body>
</html>
