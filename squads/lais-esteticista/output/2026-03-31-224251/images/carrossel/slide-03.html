<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 90px 90px;
      position: relative;
    }
    .top-accent { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: #AA9176; }
    .mito-block { display: flex; align-items: flex-start; margin-bottom: 60px; width: 100%; }
    .badge { font-size: 56px; margin-right: 30px; flex-shrink: 0; margin-top: 6px; }
    .mito-text { flex: 1; }
    .label { font-size: 28px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px; }
    .mito-block.mito .label { color: #C38F8B; }
    .mito-block.verdade .label { color: #AA9176; }
    .mito-statement { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; color: #2C2C2C; line-height: 1.3; }
    .divider { width: 100%; height: 2px; background: #E7D5BF; margin: 50px 0; }
    .verdade-items { list-style: none; }
    .verdade-items li { font-size: 40px; font-weight: 400; color: #4A3F35; line-height: 1.65; }
    .brand { position: absolute; bottom: 52px; right: 60px; font-size: 26px; font-weight: 600; color: #AA9176; }
    .slide-num { position: absolute; bottom: 52px; left: 60px; font-size: 24px; color: #BDA78D; }
  </style>
</head>
<body>
  <div class="top-accent"></div>
  <div class="mito-block mito">
    <span class="badge">❌</span>
    <div class="mito-text">
      <div class="label">Mito</div>
      <div class="mito-statement">Não funciona em pele morena ou escura</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="mito-block verdade">
    <span class="badge">✅</span>
    <div class="mito-text">
      <div class="label">Realidade</div>
      <ul class="verdade-items">
        <li>Com o equipamento adequado</li>
        <li>e profissional qualificado,</li>
        <li>funciona em todos os fototipos.</li>
        <li>A avaliação define o protocolo.</li>
      </ul>
    </div>
  </div>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-num">3 / 6</span>
</body>
</html>
