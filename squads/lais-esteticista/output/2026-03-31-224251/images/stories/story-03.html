<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(160deg, #C18881 0%, #A16C67 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
    }
    .content { text-align: center; width: 100%; }
    .emoji-big { font-size: 90px; display: block; margin-bottom: 50px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 700;
      color: #F9D4D0;
      line-height: 1.3;
      margin-bottom: 40px;
    }
    .sub {
      font-family: 'Lato', sans-serif;
      font-size: 46px; font-weight: 400;
      color: rgba(249,212,208,0.9);
      line-height: 1.5;
      margin-bottom: 70px;
    }
    .cta-pill {
      display: inline-block;
      background: #F9D4D0;
      border-radius: 100px;
      padding: 28px 70px;
      font-family: 'Lato', sans-serif;
      font-size: 42px; font-weight: 700;
      color: #A16C67;
      margin-bottom: 30px;
    }
    .cta-sub {
      font-family: 'Lato', sans-serif;
      font-size: 36px; font-weight: 600;
      color: rgba(249,212,208,0.8);
      letter-spacing: 1px;
    }
    .brand {
      position: absolute; bottom: 80px;
      font-family: 'Lato', sans-serif;
      font-size: 32px; font-weight: 700;
      color: rgba(249,212,208,0.85);
    }
  </style>
</head>
<body>
  <div class="content">
    <span class="emoji-big">✨</span>
    <h1>Avaliação gratuita disponível.</h1>
    <p class="sub">Descobre o que realmente<br>funciona para a sua pele.</p>
    <div class="cta-pill">Manda mensagem</div>
    <p class="cta-sub">@lais_esteticista</p>
  </div>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
