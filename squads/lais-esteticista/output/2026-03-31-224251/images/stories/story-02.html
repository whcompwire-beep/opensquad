<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #FFFFFF;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 80px;
      position: relative;
    }
    .top-band {
      position: absolute; top: 0; left: 0; right: 0; height: 12px;
      background: linear-gradient(90deg, #F9D4D0, #C38F8B);
    }
    .bottom-band {
      position: absolute; bottom: 0; left: 0; right: 0; height: 12px;
      background: linear-gradient(90deg, #C38F8B, #F9D4D0);
    }
    .content { text-align: center; width: 100%; }
    .tag {
      display: inline-block;
      font-family: 'Lato', sans-serif;
      font-size: 26px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: #C38F8B;
      border: 2px solid #F9D4D0;
      border-radius: 60px;
      padding: 14px 44px;
      margin-bottom: 60px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 68px; font-weight: 700;
      color: #A16C67;
      line-height: 1.3;
      margin-bottom: 50px;
    }
    .accent-line { width: 60px; height: 4px; background: #F9D4D0; margin: 0 auto 50px; border-radius: 2px; }
    .detail {
      font-family: 'Lato', sans-serif;
      font-size: 44px; font-weight: 400;
      color: #C18881;
      line-height: 1.65;
    }
    .detail strong { font-weight: 700; color: #A16C67; }
    .brand {
      position: absolute; bottom: 40px;
      font-family: 'Lato', sans-serif;
      font-size: 32px; font-weight: 700;
      color: #C38F8B;
    }
  </style>
</head>
<body>
  <div class="top-band"></div>
  <div class="bottom-band"></div>
  <div class="content">
    <div class="tag">Nos bastidores</div>
    <h1>Avaliamos sua pele antes de começar.</h1>
    <div class="accent-line"></div>
    <p class="detail">Cor, sensibilidade e histórico.<br>O equipamento é calibrado<br>para <strong>você especificamente</strong> —<br>não existe um protocolo único.</p>
  </div>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
