<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #2E1A22;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .noise-overlay {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(180, 100, 130, 0.18) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(100, 40, 70, 0.3) 0%, transparent 50%);
      pointer-events: none;
    }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #C4849A; }
    .tag {
      position: absolute; top: 56px; left: 70px;
      font-family: 'Lato', sans-serif;
      font-size: 22px; font-weight: 500;
      color: rgba(196, 132, 154, 0.8);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .reel-icon {
      font-size: 52px;
      margin-bottom: 44px;
      opacity: 0.9;
    }
    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 24px; font-weight: 400;
      color: #C4849A;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 44px;
    }
    .heading {
      font-family: 'Playfair Display', serif;
      font-size: 88px; font-weight: 400; font-style: italic;
      color: #F5EDE3;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 60px;
      max-width: 860px;
    }
    .heading em { color: #D4A0B5; font-style: normal; }
    .divider {
      width: 80px; height: 2px; background: #C4849A;
      margin-bottom: 56px;
    }
    .sub {
      font-family: 'Lato', sans-serif;
      font-size: 38px; font-weight: 300;
      color: rgba(245, 237, 227, 0.75);
      text-align: center;
      line-height: 1.7;
      max-width: 780px;
      margin-bottom: 80px;
    }
    .highlight { color: #D4A0B5; font-weight: 500; }
    .cta-pill {
      background: rgba(196, 132, 154, 0.2);
      border: 1px solid rgba(196, 132, 154, 0.5);
      border-radius: 60px;
      padding: 24px 56px;
      font-family: 'Lato', sans-serif;
      font-size: 32px; font-weight: 500;
      color: #C4849A;
      letter-spacing: 1px;
    }
    .brand { position: absolute; bottom: 56px; right: 70px; font-family: 'Lato', sans-serif; font-size: 28px; font-weight: 500; color: #C4849A; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="noise-overlay"></div>
  <div class="tag">Reel</div>
  <div class="reel-icon">🎬</div>
  <div class="eyebrow">Radiofrequência Facial</div>
  <h1 class="heading">Você viu a pele<br>da <em>Ana Paula Renault</em><br>no BBB?</h1>
  <div class="divider"></div>
  <p class="sub">Ela tem <span class="highlight">44 anos.</span><br>E o protocolo dela<br>inclui radiofrequência.</p>
  <div class="cta-pill">▶ Assista</div>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
