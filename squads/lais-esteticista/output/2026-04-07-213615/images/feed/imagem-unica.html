<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1080px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px;
      position: relative;
    }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #BDA78D; }
    .bottom-line { position: absolute; bottom: 0; left: 0; right: 0; height: 6px; background: #BDA78D; }
    .corner-ornament {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-size: 200px;
      color: rgba(189, 167, 141, 0.1);
      line-height: 1;
      top: -20px; left: 40px;
    }
    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 20px; font-weight: 400;
      color: #AA9176;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .quote {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 400; font-style: italic;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 48px;
      max-width: 820px;
    }
    .quote em { color: #AA9176; font-style: italic; }
    .divider { width: 60px; height: 2px; background: #AA9176; margin-bottom: 40px; }
    .author {
      font-family: 'Lato', sans-serif;
      font-size: 26px; font-weight: 300;
      color: #9A8878;
      letter-spacing: 1px;
      font-style: italic;
    }
    .brand { position: absolute; bottom: 28px; right: 60px; font-family: 'Lato', sans-serif; font-size: 24px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
    .season-tag {
      position: absolute; bottom: 28px; left: 60px;
      font-family: 'Lato', sans-serif;
      font-size: 22px; font-weight: 300;
      color: #BDA78D;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="bottom-line"></div>
  <div class="corner-ornament">"</div>
  <div class="eyebrow">Cuidados com a pele</div>
  <p class="quote">"Cuide da sua pele<br>antes que o <em>inverno</em><br>cuide dela."</p>
  <div class="divider"></div>
  <p class="author">Radiofrequência facial — o momento certo é agora.</p>
  <span class="brand">@lais_esteticista</span>
  <span class="season-tag">outono 2026</span>
</body>
</html>
