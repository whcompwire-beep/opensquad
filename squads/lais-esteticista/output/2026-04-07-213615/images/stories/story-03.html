<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #E7D5BF;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #AA9176; }
    .label {
      font-family: 'Lato', sans-serif;
      font-size: 24px; font-weight: 400;
      color: #AA9176;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 44px;
    }
    .solution {
      font-family: 'Playfair Display', serif;
      font-size: 70px; font-weight: 400; font-style: italic;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.35;
      margin-bottom: 72px;
      max-width: 840px;
    }
    .solution em { color: #AA9176; }
    .caixa-perguntas {
      background: #FDFAF7;
      border: 2px solid #BDA78D;
      border-radius: 28px;
      padding: 52px 56px;
      text-align: center;
      max-width: 820px;
      width: 100%;
    }
    .caixa-label {
      font-family: 'Lato', sans-serif;
      font-size: 26px; font-weight: 500;
      color: #AA9176;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .caixa-text {
      font-family: 'Lato', sans-serif;
      font-size: 38px; font-weight: 300;
      color: #6B5F55;
      line-height: 1.6;
    }
    .caixa-icon { font-size: 52px; margin-top: 24px; }
    .brand { position: absolute; bottom: 60px; right: 80px; font-family: 'Lato', sans-serif; font-size: 28px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="label">A solução</div>
  <p class="solution">A radiofrequência<br>ativa o colágeno<br>de <em>dentro pra fora</em> —<br>exatamente o que<br>a pele precisa agora.</p>
  <div class="caixa-perguntas">
    <p class="caixa-label">📩 Caixa de perguntas</p>
    <p class="caixa-text">Me manda sua dúvida<br>sobre radiofrequência</p>
    <div class="caixa-icon">💬</div>
  </div>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
