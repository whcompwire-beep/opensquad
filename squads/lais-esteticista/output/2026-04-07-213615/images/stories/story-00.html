<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #BDA78D;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #AA9176; }
    .season {
      font-family: 'Lato', sans-serif;
      font-size: 24px; font-weight: 400;
      color: #FDFAF7;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 60px;
      opacity: 0.85;
    }
    .leaf { font-size: 80px; margin-bottom: 44px; }
    .heading {
      font-family: 'Playfair Display', serif;
      font-size: 80px; font-weight: 400; font-style: italic;
      color: #FDFAF7;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 56px;
      max-width: 820px;
    }
    .arrow { font-size: 70px; color: #FDFAF7; margin-top: 20px; }
    .brand { position: absolute; bottom: 60px; right: 80px; font-family: 'Lato', sans-serif; font-size: 28px; font-weight: 500; color: #FDFAF7; letter-spacing: 2px; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="leaf">🍂</div>
  <div class="season">Outono 2026</div>
  <p class="heading">Uma coisa sobre<br>o outono que ninguém<br>fala sobre<br>a sua pele</p>
  <div class="arrow">👇</div>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
