<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 10px;
      background: linear-gradient(90deg, #AA9176 0%, #BDA78D 100%);
    }
    .icon { font-size: 90px; margin-bottom: 52px; }
    .label {
      font-family: 'Lato', sans-serif;
      font-size: 24px; font-weight: 400;
      color: #AA9176;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 44px;
    }
    .fact {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 400; font-style: italic;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.35;
      margin-bottom: 56px;
      max-width: 840px;
    }
    .fact em { color: #AA9176; }
    .divider { width: 60px; height: 2px; background: #BDA78D; margin-bottom: 52px; }
    .explanation {
      font-family: 'Lato', sans-serif;
      font-size: 38px; font-weight: 300;
      color: #6B5F55;
      text-align: center;
      line-height: 1.7;
      max-width: 800px;
    }
    .explanation strong { font-weight: 500; color: #3D342B; }
    .brand { position: absolute; bottom: 60px; right: 80px; font-family: 'Lato', sans-serif; font-size: 28px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="icon">🌡️</div>
  <div class="label">Você sabia?</div>
  <p class="fact">O frio reduz a <em>circulação</em><br>sanguínea da pele.</p>
  <div class="divider"></div>
  <p class="explanation">Isso afeta diretamente<br>a <strong>produção de colágeno</strong>.<br><br>O inverno não espera.<br>A pele, também não.</p>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
