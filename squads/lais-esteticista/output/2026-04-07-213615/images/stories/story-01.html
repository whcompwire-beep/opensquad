<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #BDA78D; }
    .question-label {
      font-family: 'Lato', sans-serif;
      font-size: 24px; font-weight: 400;
      color: #AA9176;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .question {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 400; font-style: italic;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.35;
      margin-bottom: 80px;
      max-width: 860px;
    }
    .poll-box {
      width: 100%;
      max-width: 820px;
      border: 2px solid #D2BBA0;
      border-radius: 28px;
      overflow: hidden;
    }
    .poll-label {
      background: #D2BBA0;
      padding: 22px 40px;
      font-family: 'Lato', sans-serif;
      font-size: 24px; font-weight: 500;
      color: #FDFAF7;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    .poll-option {
      padding: 44px 48px;
      font-family: 'Lato', sans-serif;
      font-size: 40px; font-weight: 300;
      color: #3D342B;
      border-bottom: 1px solid #E7D5BF;
      background: #FDFAF7;
      display: flex; align-items: center; gap: 24px;
    }
    .poll-option:last-child { border-bottom: none; }
    .poll-option.active { background: #E7D5BF; }
    .brand { position: absolute; bottom: 60px; right: 80px; font-family: 'Lato', sans-serif; font-size: 28px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="question-label">Enquete</div>
  <p class="question">Você já notou sua pele<br>ficando mais flácida<br>ou cansada no inverno?</p>
  <div class="poll-box">
    <div class="poll-label">Responde aí 👇</div>
    <div class="poll-option active">😔 Sim, sempre</div>
    <div class="poll-option">🤔 Não percebi ainda</div>
  </div>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
