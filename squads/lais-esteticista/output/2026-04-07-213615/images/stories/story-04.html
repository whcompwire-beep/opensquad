<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #AA9176;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 100px 90px;
      position: relative;
    }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #E7D5BF; }
    .label {
      font-family: 'Lato', sans-serif;
      font-size: 24px; font-weight: 400;
      color: #E7D5BF;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 52px;
      opacity: 0.9;
    }
    .heading {
      font-family: 'Playfair Display', serif;
      font-size: 76px; font-weight: 400; font-style: italic;
      color: #FDFAF7;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 60px;
      max-width: 820px;
    }
    .divider { width: 60px; height: 2px; background: #E7D5BF; margin-bottom: 56px; opacity: 0.7; }
    .detail {
      font-family: 'Lato', sans-serif;
      font-size: 40px; font-weight: 300;
      color: rgba(253, 250, 247, 0.8);
      text-align: center;
      line-height: 1.65;
      margin-bottom: 72px;
    }
    .cta-button {
      background: #E7D5BF;
      border-radius: 60px;
      padding: 32px 80px;
      font-family: 'Lato', sans-serif;
      font-size: 38px; font-weight: 700;
      color: #AA9176;
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 36px;
    }
    .cta-sub {
      font-family: 'Lato', sans-serif;
      font-size: 30px; font-weight: 300;
      color: rgba(253, 250, 247, 0.7);
      text-align: center;
      font-style: italic;
    }
    .brand { position: absolute; bottom: 60px; right: 80px; font-family: 'Lato', sans-serif; font-size: 28px; font-weight: 500; color: #FDFAF7; letter-spacing: 2px; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="label">Agenda aberta</div>
  <p class="heading">Vagas abertas<br>para avaliação</p>
  <div class="divider"></div>
  <p class="detail">Aqui em Mafra-SC.<br>Sem compromisso.<br>Com toda atenção que<br>sua pele merece.</p>
  <div class="cta-button">Enviar mensagem</div>
  <span class="brand">@lais_esteticista</span>
</body>
</html>
