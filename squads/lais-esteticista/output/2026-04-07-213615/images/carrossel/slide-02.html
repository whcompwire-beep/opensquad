<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px;
      position: relative;
    }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #BDA78D; }
    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 160px; color: #E7D5BF;
      line-height: 0.6;
      margin-bottom: 30px;
    }
    .question {
      font-family: 'Playfair Display', serif;
      font-size: 68px; font-weight: 400; font-style: italic;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 60px;
      max-width: 820px;
    }
    .divider { width: 60px; height: 2px; background: #AA9176; margin-bottom: 50px; }
    .body-text {
      font-family: 'Lato', sans-serif;
      font-size: 38px; font-weight: 300;
      color: #6B5F55;
      text-align: center;
      line-height: 1.7;
      max-width: 820px;
    }
    .highlight { color: #AA9176; font-weight: 500; }
    .brand { position: absolute; bottom: 52px; right: 70px; font-family: 'Lato', sans-serif; font-size: 26px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
    .slide-number { position: absolute; bottom: 55px; left: 70px; font-size: 22px; color: #BDA78D; font-family: 'Lato', sans-serif; }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="quote-mark">"</div>
  <p class="question">E se eu ficar<br>parecendo outra pessoa?"</p>
  <div class="divider"></div>
  <p class="body-text">Esse é o <span class="highlight">medo número 1</span><br>das minhas pacientes.<br><br>E faz todo sentido.<br><br>Mas a radiofrequência funciona diferente.</p>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-number">2/6</span>
</body>
</html>
