<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px;
      position: relative;
    }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #BDA78D; }
    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 20px; font-weight: 400;
      color: #AA9176;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .heading {
      font-family: 'Playfair Display', serif;
      font-size: 62px; font-weight: 400; font-style: italic;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.35;
      margin-bottom: 56px;
      max-width: 840px;
    }
    .divider { width: 60px; height: 2px; background: #AA9176; margin-bottom: 56px; }
    .body-text {
      font-family: 'Lato', sans-serif;
      font-size: 38px; font-weight: 300;
      color: #6B5F55;
      text-align: center;
      line-height: 1.75;
      max-width: 820px;
    }
    .highlight { color: #AA9176; font-weight: 500; }
    .tagline {
      margin-top: 52px;
      font-family: 'Playfair Display', serif;
      font-size: 42px; font-weight: 600;
      color: #2C2C2C;
      text-align: center;
      font-style: italic;
    }
    .brand { position: absolute; bottom: 52px; right: 70px; font-family: 'Lato', sans-serif; font-size: 26px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
    .slide-number { position: absolute; bottom: 55px; left: 70px; font-size: 22px; color: #BDA78D; font-family: 'Lato', sans-serif; }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="eyebrow">Como funciona</div>
  <p class="heading">Ela não coloca<br>nada novo na sua pele.</p>
  <div class="divider"></div>
  <p class="body-text">Ela aquece as camadas profundas<br>e <span class="highlight">acorda o colágeno</span><br>que você já tinha.</p>
  <p class="tagline">É o seu rosto.<br>Só mais firme.</p>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-number">3/6</span>
</body>
</html>
