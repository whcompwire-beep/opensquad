<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px;
      position: relative;
    }
    .top-line {
      position: absolute; top: 0; left: 0; right: 0;
      height: 6px; background: #BDA78D;
    }
    .accent-line {
      width: 70px; height: 3px;
      background: #AA9176;
      margin-bottom: 52px;
    }
    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 22px; font-weight: 400;
      color: #AA9176;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 90px; font-weight: 700;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 48px;
    }
    h1 em {
      font-style: italic;
      color: #AA9176;
    }
    .subtitle {
      font-family: 'Lato', sans-serif;
      font-size: 30px; font-weight: 300;
      color: #7A6A5A;
      text-align: center;
      line-height: 1.6;
      font-style: italic;
      max-width: 780px;
    }
    .brand {
      position: absolute;
      bottom: 52px; right: 70px;
      font-family: 'Lato', sans-serif;
      font-size: 26px; font-weight: 500;
      color: #AA9176;
      letter-spacing: 2px;
    }
    .slide-number {
      position: absolute;
      bottom: 55px; left: 70px;
      font-size: 22px; color: #BDA78D; font-family: 'Lato', sans-serif;
    }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="eyebrow">Radiofrequência Facial</div>
  <div class="accent-line"></div>
  <h1>Radiofrequência<br>não te muda.<br><em>Ela te revela.</em></h1>
  <p class="subtitle">e se você tem medo de ficar com cara de procedimento<br>— esse post é pra você</p>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-number">1/6</span>
</body>
</html>
