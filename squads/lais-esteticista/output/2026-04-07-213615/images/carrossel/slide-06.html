<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: linear-gradient(160deg, #D2BBA0 0%, #AA9176 100%);
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px 80px;
      position: relative;
    }
    .accent-line { width: 80px; height: 4px; background: #FFFFFF; opacity: 0.6; margin-bottom: 52px; border-radius: 2px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 700;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 56px;
    }
    .cta-box {
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      padding: 48px 64px;
      text-align: center;
      max-width: 820px;
      width: 100%;
    }
    .cta-main {
      font-family: 'Lato', sans-serif;
      font-size: 44px; font-weight: 700;
      color: #FFFFFF;
      line-height: 1.4;
      margin-bottom: 20px;
    }
    .cta-sub {
      font-family: 'Lato', sans-serif;
      font-size: 36px; font-weight: 300;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.6;
      font-style: italic;
    }
    .brand { position: absolute; bottom: 52px; right: 70px; font-family: 'Lato', sans-serif; font-size: 26px; font-weight: 700; color: rgba(255, 255, 255, 0.9); letter-spacing: 1px; }
    .slide-number { position: absolute; bottom: 55px; left: 70px; font-size: 22px; color: rgba(255, 255, 255, 0.6); font-family: 'Lato', sans-serif; }
  </style>
</head>
<body>
  <div class="accent-line"></div>
  <h1>Quer saber se a radiofrequência<br>é o tratamento certo<br>pra você?</h1>
  <div class="cta-box">
    <div class="cta-main">Me chama no direct.</div>
    <div class="cta-sub">Faço avaliação personalizada<br>sem compromisso.</div>
  </div>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-number">6/6</span>
</body>
</html>
