<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px; height: 1440px; overflow: hidden;
      background: #FDFAF7;
      font-family: 'Lato', sans-serif;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 90px;
      position: relative;
    }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #BDA78D; }
    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 20px; font-weight: 400;
      color: #AA9176;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .heading {
      font-family: 'Playfair Display', serif;
      font-size: 70px; font-weight: 700;
      color: #2C2C2C;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 60px;
    }
    .checklist {
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 100%;
      max-width: 760px;
    }
    .check-item {
      display: flex;
      align-items: center;
      gap: 28px;
      background: #F5EDE3;
      border-radius: 16px;
      padding: 28px 36px;
    }
    .check-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #AA9176;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #FFFFFF;
      font-size: 26px;
      font-weight: 700;
    }
    .check-text {
      font-family: 'Lato', sans-serif;
      font-size: 36px;
      font-weight: 400;
      color: #3D342B;
      line-height: 1.3;
    }
    .brand { position: absolute; bottom: 52px; right: 70px; font-family: 'Lato', sans-serif; font-size: 26px; font-weight: 500; color: #AA9176; letter-spacing: 2px; }
    .slide-number { position: absolute; bottom: 55px; left: 70px; font-size: 22px; color: #BDA78D; font-family: 'Lato', sans-serif; }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <div class="eyebrow">Para quem é</div>
  <h2 class="heading">A radiofrequência<br>é indicada para:</h2>
  <div class="checklist">
    <div class="check-item">
      <div class="check-icon">✓</div>
      <span class="check-text">30 a 60 anos</span>
    </div>
    <div class="check-item">
      <div class="check-icon">✓</div>
      <span class="check-text">Qualquer tipo de pele</span>
    </div>
    <div class="check-item">
      <div class="check-icon">✓</div>
      <span class="check-text">Sem corte, sem agulha</span>
    </div>
    <div class="check-item">
      <div class="check-icon">✓</div>
      <span class="check-text">Sem tempo de recuperação</span>
    </div>
    <div class="check-item">
      <div class="check-icon">✓</div>
      <span class="check-text">Resultado progressivo e natural</span>
    </div>
  </div>
  <span class="brand">@lais_esteticista</span>
  <span class="slide-number">4/6</span>
</body>
</html>
