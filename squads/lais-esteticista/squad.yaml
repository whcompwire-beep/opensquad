name: lais-esteticista
display_name: "Laís Esteticista — Squad de Conteúdo"
description: >
  Squad completo de marketing digital para Laís Esteticista.
  Produz conteúdo para Instagram Feed (carrossel e imagem única), Instagram Reels e
  Instagram Stories voltado para mulheres que buscam serviços de estética.
  Inclui análise de qualidade final após entrega visual.
version: "2.0.0"
created: "2026-03-31"
performance_mode: alta_performance

investigation:
  enriched: true
  profiles_analyzed: 3
  date: "2026-03-27"
  dir: squads/estetica-criativa/_investigations

platforms:
  - instagram-feed
  - instagram-reels
  - instagram-stories

company: Laís Esteticista
instagram_handle: "@lais_esteticista"

agents:
  - id: estrategista
    name: Estrategista de Beleza
    file: agents/estrategista.agent.md
    role: strategist
  - id: pesquisadora
    name: Pesquisadora de Tendências
    file: agents/pesquisadora.agent.md
    role: researcher
  - id: redatora
    name: Redatora Criativa
    file: agents/redatora.agent.md
    role: writer
  - id: revisora
    name: Revisora de Qualidade
    file: agents/revisora.agent.md
    role: reviewer
  - id: designer
    name: Designer Visual
    file: agents/designer.agent.md
    role: designer
  - id: analista
    name: Analista de Qualidade Final
    file: agents/analista-qualidade.agent.md
    role: analyst
  - id: especialista-ads
    name: Especialista em Tráfego Pago
    file: agents/especialista-ads.agent.md
    role: ads-specialist

pipeline:
  steps:
    - id: verificacao-tecnica
      type: sistema
      label: "Verificação técnica (Playwright)"
      file: pipeline/steps/00-verificacao-tecnica.step.md

    - id: checkpoint-tema
      type: checkpoint
      label: "Definir tema e tom desta rodada"
      file: pipeline/steps/01-checkpoint-tema.step.md

    - id: pesquisa-tendencias
      agent: pesquisadora
      file: pipeline/steps/01b-pesquisa-tendencias.step.md
      description: "Busca trending topics, newsjacking e sazonalidade para a rodada"

    - id: estrategia
      agent: estrategista
      file: pipeline/steps/02-estrategia.step.md
      description: "Cria briefing com 3 ângulos de conteúdo, hooks e score de potencial de ads"

    - id: checkpoint-estrategia
      type: checkpoint
      label: "Aprovar estratégia de conteúdo"
      file: pipeline/steps/03-checkpoint-estrategia.step.md

    - id: conteudo
      agent: redatora
      file: pipeline/steps/04-conteudo.step.md
      description: "Cria conteúdo completo para Feed (carrossel + imagem), Reels e Stories"

    - id: checkpoint-conteudo
      type: checkpoint
      label: "Aprovar rascunhos de conteúdo"
      file: pipeline/steps/05-checkpoint-conteudo.step.md

    - id: revisao
      agent: revisora
      file: pipeline/steps/06-revisao.step.md
      description: "Avalia qualidade, score, mini-checklist de ads e solicita ajustes se necessário"

    - id: visual
      agent: designer
      file: pipeline/steps/07-visual.step.md
      description: "Busca assets fotográficos (image-fetcher) e renderiza HTML/CSS em PNGs"

    - id: checkpoint-visual
      type: checkpoint
      label: "Aprovar imagens geradas"
      file: pipeline/steps/08-checkpoint-visual.step.md

    - id: analise-qualidade
      agent: analista
      file: pipeline/steps/09-analise-qualidade.step.md
      description: "Análise final integrada: copy + visual + consistência de marca"

    - id: checkpoint-qualidade-final
      type: checkpoint
      label: "Relatório de qualidade final"
      file: pipeline/steps/10-checkpoint-qualidade-final.step.md

    - id: especialista-ads
      agent: especialista-ads
      file: pipeline/steps/10b-especialista-ads.step.md
      description: "Avalia potencial de impulsionamento de cada peça no Meta Ads"

    - id: checkpoint-ads
      type: checkpoint
      label: "Plano de tráfego pago e decisão de impulsionamento"
      file: pipeline/steps/11-checkpoint-ads.step.md

output_dir: squads/lais-esteticista/output
memory_file: squads/lais-esteticista/_memory/memories.md
