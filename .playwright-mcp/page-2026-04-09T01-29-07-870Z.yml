        - paragraph [ref=e1005]: Óleo de Argan com fórmula leve de toque seco para fios macios, com controle do frizz e estática.O Óleo de Argan é rico em ácidos graxos, vitamina A, D e E, o óleo de Argan é um poderoso hidratante e antioxidante natural que retarda o envelhecimento dos fios, restaura a fibra capilar, fortalecendo, nutrindo e revitalizando o couro cabeludo e os fios. Além disso ele minimiza o desgaste dos fios provocado por poluição, sol, vento, secador, chapinha, piscina, mar e processos químicos.
