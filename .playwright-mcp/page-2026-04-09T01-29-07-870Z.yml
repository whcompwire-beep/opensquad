                      - generic [ref=e1404]:
                        - generic [ref=e1406]:
                          - text: A maioria dos óleos de argan são na verdade um blend de silicones que contém em sua composição o óleo de argan e, quando muito, mais algum outro ativo de tratamento. Já no da Lola, o óleo de argan é o 2º ativo da composição. O primeiro é o Cocoato de isoamila, um emoliente derivado da beterraba e do óleo de coco. Contém ainda glicerina, extratos de algas marinhas, proteínas hidrolisadas do arroz e da soja e glicina. Logo, é uma composição mais rica em óleo de argan e muito mais completa que a maioria dos óleos vendidos em supermercados, farmácias e até mesmo por aqui na Amazon.
                          - text: Sim, estes últimos podem até ser mais embelezadores, dada a alta quantidade de silicones que irão conferir, imediatamente, brilho e maciez, mas o óleo da Lola é um óleo que, além de embelezar, irá efetivamente tratar, uma vez que sua composição possui BEM MAIS óleo de argan e BEM MAIS ativos hidratantes e restauradores. E OK, talvez haja muita gente que talvez até prefira os óleos com blend de silicones, especialmente porque procuram embelezar o cabelo de forma mais perceptível e imediata (algo que os silicones realmente entregam). No entanto, é um erro achar que eles irão tratar mais que o da Lola. É justamente o contrário. Para mim são produtos com finalidades diferentes.
                          - text: Dito isto, é o meu óleo predileto para finalizar o cabelo, seja seco ou molhado, porque além de hidratar e diminuir o frizz, rende bastante, tem um cheiro muito agradável e não acumula nos fios. Recomendo demais.
