          - heading "Informações de segurança" [level=4] [ref=e993]
          - paragraph
          - paragraph [ref=e994]: Uso externo. Não ingerir. Evitar contato com olhos e mucosas. Manter fora do alcance de crianças. Conservar em local fresco e ao abrigo da luz. Suspenda o uso em caso de irritação. Pessoas alérgicas a componentes da fórmula não devem utilizar.
          - paragraph
        - generic [ref=e995]:
          - heading "Instruções" [level=4] [ref=e996]
          - paragraph
          - paragraph [ref=e997]: Aplique uma pequena quantidade de óleo nos fios úmidos ou secos, evitando a raiz. Penteie para distribuir uniformemente. Use antes ou depois de estilizar os cabelos para proteger e reparar os fios.
          - paragraph
