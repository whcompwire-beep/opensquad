          - paragraph [ref=e1005]: Aplique 3 a 4 pressões do Óleo Extraordinário em todo o cabelo, podendo ser usado tanto em cabelos molhados quanto secos. Use antes da escova para nutrir os fios, como finalizador para dar forma à fibra capilar ou a qualquer momento do dia para disciplinar o frizz e realçar o brilho dos cabelos. Escolha sua maneira de usar e impressione com a beleza extraordinária dos seus cabelos!
          - paragraph
      - generic [ref=e1008]:
        - heading "Descrição do produto" [level=2] [ref=e1011]
        - paragraph [ref=e1013]: Descubra o poder transformador do Óleo Extraordinário Elseve de L'Oréal Paris, enriquecido com 6 óleos de flores preciosas que nutrem profundamente todos os tipos de cabelo. Sua fórmula leve e não gordurosa penetra nas fibras capilares sem deixar resíduos ou pesar nos fios, proporcionando hidratação intensa e brilho extraordinário desde a primeira aplicação. Com proteção térmica de até 230°C, este finalizador defende seus cabelos contra danos de secadores, chapinhas e babyliss, enquanto sua poderosa ação anti-frizz disciplina os fios rebeldes instantaneamente, mesmo em dias úmidos. A textura sedosa desliza suavemente pelos fios, garantindo cabelos disciplinados por muito mais tempo. Versátil e prático, pode ser aplicado em cabelos úmidos como leave-in protetor antes da escova para facilitar o penteado, ou em cabelos secos como finalizador para um toque de brilho intenso e controle adicional do frizz. Permite múltiplas aplicações ao longo do dia sempre que seus cabelos precisarem de um cuidado extra. Transforme seus cabelos com nutrição profunda e revele toda sua beleza natural. O Óleo Extraordinário Elseve é o segredo para cabelos extraordinariamente macios, brilhantes e saudáveis todos os dias.
